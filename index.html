// ── Date helpers ──────────────────────────────────────────────────
function getBrazilToday(){
  return new Date(Date.now()-3*60*60*1000).toISOString().split("T")[0];
}

// 14 dias para carregar das APIs (hoje-6 até hoje+7)
function getLoadDates(){
  const brt=new Date(Date.now()-3*60*60*1000);
  return Array.from({length:14},(_,i)=>{
    const d=new Date(brt); d.setDate(brt.getDate()-(6-i));
    return d.toISOString().split("T")[0];
  });
}

// 8 dias visíveis no carrossel centrados no dia selecionado
// Regras: min=hoje-6, max=hoje+7, mostra 6 atrás + sel + 1 à frente
function getVisibleDates(selDate, todayStr){
  const today=new Date(todayStr+"T12:00:00");
  const sel=new Date(selDate+"T12:00:00");
  const minD=new Date(today); minD.setDate(today.getDate()-6);
  const maxD=new Date(today); maxD.setDate(today.getDate()+7);
  // âncora = sel+1, limitado ao max
  const anchor=new Date(sel); anchor.setDate(sel.getDate()+1);
  const end=anchor>maxD?maxD:anchor;
  // gera 8 dias terminando em end
  return Array.from({length:8},(_,i)=>{
    const d=new Date(end); d.setDate(end.getDate()-(7-i));
    return d.toISOString().split("T")[0];
  }).filter(d=>d>=minD.toISOString().split("T")[0]&&d<=maxD.toISOString().split("T")[0]);
}

function dateAdd(dateStr, days){
  const d=new Date(dateStr+"T12:00:00"); d.setDate(d.getDate()+days);
  return d.toISOString().split("T")[0];
}

// ── KV ────────────────────────────────────────────────────────────
async function saveOddsToKV(games,sport){
  const isBra=sport?.id==="bra";
  const toSave=games.filter(g=>g.status!=="Final"&&g.over_under).map(g=>({
    id:g.id,over_under:g.over_under,spread:g.spread||null,
    proj:isBra?parseFloat(((g.home_ppg||0)+(g.away_ppg||0))/2):(g.home_ppg||0)+(g.away_ppg||0),
    home_ppg:g.home_ppg||null,away_ppg:g.away_ppg||null,
  }));
  if(!toSave.length)return;
  try{await fetch("/api/save-odds",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({games:toSave})});}
  catch(e){console.error("save-odds failed:",e);}
}
async function loadOddsFromKV(ids){
  if(!ids.length)return{};
  try{const r=await fetch(`/api/get-odds?ids=${ids.join(",")}`);const d=await r.json();return d.odds||{};}
  catch{return{};}
}

// ── Stats ─────────────────────────────────────────────────────────
function getFB(sport,name){return sport.id==="nba"?(PPG_FB[name]||0):(GPJ_FB[name]||1.3);}

function calcResult(proj,ou,real){
  if(!ou||real==null)return null;
  return(proj>ou)===(real>ou)?"hit":"miss";
}

function getGameStats(game,savedOddsMap,sport){
  const isBra=sport.id==="bra";
  const saved=savedOddsMap?.[String(game.id)];
  const isFinal=game.status==="Final";
  const hPpg=saved?.home_ppg||game.home_ppg||getFB(sport,game.home);
  const aPpg=saved?.away_ppg||game.away_ppg||getFB(sport,game.away);
  const ou=game.over_under||saved?.over_under||null;
  const spread=game.spread||saved?.spread||null;
  let proj,avg;
  if(isBra){
    proj=(isFinal&&saved?.proj)?saved.proj:parseFloat(((hPpg+aPpg)/2).toFixed(2));
    avg=proj;
  }else{
    proj=(isFinal&&saved?.proj)?saved.proj:(hPpg+aPpg);
    avg=parseFloat((proj/2).toFixed(1));
  }
  const real=(game.hs!=null&&game.vs!=null)?(isBra?game.hs:game.hs+game.vs):null;
  const validOU=ou&&(!isBra||ou<=3.5)?ou:null;
  const result=isFinal?calcResult(saved?.proj||proj,validOU,real):null;
  return{hPpg,aPpg,avg,proj,realTotal:real,result,overUnder:validOU,spread};
}

// ── Suggestions ───────────────────────────────────────────────────
function fieldIsAbove(a,t){return t>0&&a*2>=t;}
function countFields(h){
  if(!h)return{above:0,below:0,total:0};
  const fs=[
    {above:h.home.above,total:h.home.total},
    {above:h.home.last5.above,total:h.home.last5.total},
    {above:h.away.above,total:h.away.total},
    {above:h.away.last5.above,total:h.away.last5.total},
  ];
  let above=0,below=0,valid=0;
  for(const f of fs){if(!f.total)continue;valid++;if(fieldIsAbove(f.above,f.total))above++;else below++;}
  return{above,below,total:valid};
}
function s1(p,ou){if(!ou)return null;return p>ou?"OVER":p<ou?"UNDER":null;}
function s2(p,ou,h){const b=s1(p,ou);if(!b||!h)return null;const{above,below,total}=countFields(h);if(total<3)return null;if(b==="OVER"&&above>=3)return"OVER";if(b==="UNDER"&&below>=3)return"UNDER";return"NÃO APOSTE";}
function s3(h){if(!h)return null;const{above,below,total}=countFields(h);if(total<3)return null;if(above>=3)return"OVER";if(below>=3)return"UNDER";return"NÃO APOSTE";}
function s4(p,ou,h){const b=s1(p,ou);if(!b)return null;if(!h)return b;const{above,below,total}=countFields(h);if(total<3)return b;const cd=above>=3?"OVER":below>=3?"UNDER":null;if(!cd)return b;if(cd===b)return b;return cd;}
function s5(p,ou,h,md){const b=s1(p,ou);if(!b||!ou||!h)return null;const{above,below,total}=countFields(h);if(total<3)return null;if(Math.abs(p-ou)<md)return"NÃO APOSTE";const cd=above>=3?"OVER":below>=3?"UNDER":null;if(!cd||cd!==b)return"NÃO APOSTE";return b;}
function calcRS(sg,ou,real){if(!sg||!ou||real==null)return null;if(sg==="NÃO APOSTE")return"skip";return sg==="OVER"?(real>ou?"hit":"miss"):(real<=ou?"hit":"miss");}

// ── Hist cache ────────────────────────────────────────────────────
const HC={};
async function fetchHist(hid,aid,avg,sport){
  const ep=sport.id==="bra"?"/api/history-soccer":"/api/history";
  const k=`${sport.id}_${hid}_${aid}_${avg}`;
  if(HC[k])return HC[k];
  try{const r=await fetch(`${ep}?home_id=${hid}&away_id=${aid}&matchup_avg=${avg}`);const d=await r.json();HC[k]=d;return d;}
  catch{return null;}
}

// ── Kelly ─────────────────────────────────────────────────────────
function kFrac(p,o){const b=o-1,q=1-p;return(b*p-q)/b;}
function eProb(acc,div){return Math.min(0.75,Math.min(0.75,Math.max(0.4,acc))+Math.min(0.10,(Math.abs(div)/5)*0.02));}

// ── UI Components ─────────────────────────────────────────────────
function ScoreBar({above,total}){
  const pct=total>0?(above/total)*100:0,col=pct>=50?GREEN:MISS_COLOR;
  return(<div style={{display:"flex",alignItems:"center",gap:6}}>
    <div style={{flex:1,height:4,background:SURFACE2,borderRadius:2,overflow:"hidden"}}>
      <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:2}}/>
    </div>
    <span style={{fontSize:11,fontWeight:500,color:col,minWidth:32,textAlign:"right"}}>{above}/{total}</span>
  </div>);
}

function RuleChip({suggestion,result}){
  const skip=!suggestion||suggestion==="NÃO APOSTE";
  const col=skip?TEXT3:suggestion==="OVER"?GREEN:"#6fa3ff";
  const bg=skip?"rgba(80,80,80,0.15)":suggestion==="OVER"?"rgba(0,200,83,0.12)":"rgba(29,66,138,0.2)";
  const bd=skip?"rgba(80,80,80,0.3)":suggestion==="OVER"?"rgba(0,200,83,0.3)":"rgba(29,66,138,0.5)";
  const ic=result==="hit"?" ✓":result==="miss"?" ✗":result==="skip"?" —":"";
  const icCol=result==="hit"?HIT_COLOR:result==="miss"?MISS_COLOR:TEXT3;
  return(<span style={{display:"inline-flex",alignItems:"center",gap:2,padding:"2px 8px",borderRadius:6,background:bg,border:`1px solid ${bd}`,fontSize:11,fontWeight:700,color:col}}>
    {skip?"N/A":suggestion}{ic&&<span style={{color:icCol}}>{ic}</span>}
  </span>);
}

function AccuracyReport({schedule,dates,selDate,savedOddsMap,sport}){
  const dG=(schedule[selDate]||[]).filter(g=>g.status==="Final");
  const wG=dates.flatMap(d=>(schedule[d]||[]).filter(g=>g.status==="Final"));
  const ch=gs=>{const wo=gs.filter(g=>!!getGameStats(g,savedOddsMap,sport).overUnder);return{hits:wo.filter(g=>getGameStats(g,savedOddsMap,sport).result==="hit").length,total:wo.length};};
  const day=ch(dG),week=ch(wG);
  if(!day.total&&!week.total)return null;
  const pct=(h,t)=>t>0?Math.round((h/t)*100):0;
  return(<div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1rem 1.25rem",marginBottom:"1.25rem",display:"flex",gap:"1.5rem",alignItems:"center"}}>
    <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",flexShrink:0}}>Precisão O/U</div>
    {day.total>0&&(<><div>
      <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Hoje</div>
      <div style={{fontSize:18,fontWeight:800,color:pct(day.hits,day.total)>=50?HIT_COLOR:MISS_COLOR}}>{day.hits}/{day.total}</div>
      <div style={{fontSize:9,color:TEXT3}}>{pct(day.hits,day.total)}%</div>
    </div><div style={{width:1,height:36,background:BORDER}}/></>)}
    {week.total>0&&(<><div>
      <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Últimos 7 dias</div>
      <div style={{fontSize:18,fontWeight:800,color:pct(week.hits,week.total)>=50?HIT_COLOR:MISS_COLOR}}>{week.hits}/{week.total}</div>
      <div style={{fontSize:9,color:TEXT3}}>{pct(week.hits,week.total)}%</div>
    </div>
    <div style={{flex:1,height:6,background:SURFACE2,borderRadius:3,overflow:"hidden",maxWidth:120}}>
      <div style={{width:`${pct(week.hits,week.total)}%`,height:"100%",background:pct(week.hits,week.total)>=50?HIT_COLOR:MISS_COLOR,borderRadius:3}}/>
    </div></>)}
  </div>);
}

function OddsPanel({proj,overUnder,spread,result,realTotal,sport}){
  if(!overUnder)return null;
  const isBra=sport.id==="bra";
  const diff=proj-overUnder;
  const thr=isBra?0.3:3;
  const col=Math.abs(diff)>=thr?(diff>0?GREEN:MISS_COLOR):TEXT2;
  return(<div style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:10,padding:"1rem",marginTop:"1rem"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em"}}>Odds {isBra?"bet365":"DraftKings"}</div>
      {result&&(<div style={{padding:"2px 10px",borderRadius:20,background:result==="hit"?"rgba(0,200,83,0.15)":"rgba(200,16,46,0.15)",border:`1px solid ${result==="hit"?"rgba(0,200,83,0.4)":"rgba(200,16,46,0.4)"}`}}>
        <span style={{fontSize:10,fontWeight:700,color:result==="hit"?HIT_COLOR:MISS_COLOR}}>{result==="hit"?"✓ Acerto":"✗ Erro"} · Real: {realTotal} {sport.divLabel}</span>
      </div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:"0.75rem"}}>
      {[["Linha O/U",overUnder.toFixed(1)],[`Proj. ${sport.statLabel}`,proj.toFixed(isBra?2:1)],["Diferença",(diff>0?"+":"")+diff.toFixed(isBra?2:1)]].map(([l,v],i)=>(
        <div key={l} style={{textAlign:"center"}}>
          <div style={{fontSize:9,color:TEXT3,marginBottom:3}}>{l}</div>
          <div style={{fontSize:16,fontWeight:700,color:i===2?col:TEXT}}>{v}</div>
        </div>
      ))}
    </div>
    {!result&&(<div style={{display:"flex",justifyContent:"center",gap:8}}>
      <div style={{padding:"3px 12px",borderRadius:20,background:diff>0?"rgba(0,200,83,0.12)":"rgba(200,16,46,0.12)",border:`1px solid ${diff>0?"rgba(0,200,83,0.3)":"rgba(200,16,46,0.3)"}`}}>
        <span style={{fontSize:11,fontWeight:700,color:diff>0?GREEN:MISS_COLOR}}>{sport.statLabel} sugere {diff>0?"OVER":"UNDER"} {overUnder.toFixed(1)}</span>
      </div>
      {spread&&<div style={{padding:"3px 12px",borderRadius:20,background:SURFACE,border:`1px solid ${BORDER}`}}>
        <span style={{fontSize:11,color:TEXT2}}>{isBra?"Handicap":"Spread"}: {spread}</span>
      </div>}
    </div>)}
  </div>);
}

function HistoryPanel({homeId,awayId,matchupAvg,homeAbbr,awayAbbr,sport,onLoaded}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const isBra=sport.id==="bra";
  useEffect(()=>{
    if(!homeId||!awayId)return;
    setLoading(true);
    const ep=isBra?"/api/history-soccer":"/api/history";
    fetch(`${ep}?home_id=${homeId}&away_id=${awayId}&matchup_avg=${matchupAvg}`)
      .then(r=>r.json()).then(d=>{setData(d);setLoading(false);if(onLoaded)onLoaded(d);})
      .catch(()=>setLoading(false));
  },[homeId,awayId,matchupAvg]);
  return(<div style={{borderTop:`1px solid ${BORDER}`,paddingTop:"1.25rem",marginTop:"1rem"}}>
    <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"1rem"}}>
      {isBra?"gols acima da média":"jogos acima da média"} — {matchupAvg.toFixed(isBra?2:1)} {isBra?"gl":"pts"}
    </div>
    {loading&&<div style={{fontSize:11,color:TEXT3}}>Carregando histórico...</div>}
    {!loading&&!data&&<div style={{fontSize:11,color:TEXT3}}>Histórico indisponível</div>}
    {data&&[
      {label:`Temporada (${data.home.total}j)`,hA:data.home.above,aA:data.away.above,hn:data.home.total,an:data.away.total},
      {label:"Últimos 5 jogos",hA:data.home.last5.above,aA:data.away.last5.above,hn:data.home.last5.total,an:data.away.last5.total},
    ].map(({label,hA,aA,hn,an})=>(
      <div key={label} style={{marginBottom:"0.85rem"}}>
        <div style={{fontSize:10,color:TEXT2,marginBottom:6,fontWeight:500}}>{label}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 36px 1fr",gap:8,alignItems:"center"}}>
          <div><div style={{fontSize:11,color:TEXT3,marginBottom:4}}>{homeAbbr}</div><ScoreBar above={hA} total={hn}/></div>
          <div style={{textAlign:"center",fontSize:9,color:TEXT3}}>vs</div>
          <div><div style={{fontSize:11,color:TEXT3,marginBottom:4}}>{awayAbbr}</div><ScoreBar above={aA} total={an}/></div>
        </div>
      </div>
    ))}
    {data&&<div style={{fontSize:9,color:TEXT3,marginTop:4}}>{isBra?"Campos 1-2: gols marcados. Campos 3-4: gols sofridos.":"Dados reais ESPN"}</div>}
  </div>);
}

function EditModal({game,onSave,onClose,sport}){
  const [hs,setHs]=useState(game.hs??"");
  const [vs,setVs]=useState(game.vs??"");
  const hA=game.home_abbr||game.home.split(" ").pop();
  const aA=game.away_abbr||game.away.split(" ").pop();
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
    <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1.5rem",width:300}}>
      <div style={{height:3,background:`linear-gradient(90deg,${sport.primary},${sport.secondary})`,borderRadius:2,marginBottom:"1.25rem"}}/>
      <div style={{fontSize:11,color:TEXT2,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"1.25rem",textAlign:"center"}}>Inserir placar final</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 24px 1fr",alignItems:"center",gap:8,marginBottom:"1.5rem"}}>
        {[["home",hA,hs,setHs],["away",aA,vs,setVs]].map(([side,label,val,set])=>(
          <div key={side} style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:TEXT2,marginBottom:8,textTransform:"uppercase"}}>{label}</div>
            <input type="number" value={val} onChange={e=>set(e.target.value)}
              style={{width:"100%",background:SURFACE2,color:TEXT,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px 8px",fontSize:22,fontWeight:700,textAlign:"center"}}/>
          </div>
        ))}
        <div style={{textAlign:"center",color:TEXT3,fontSize:14,paddingTop:20}}>×</div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={onClose} style={{flex:1,background:"transparent",color:TEXT2,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px",fontSize:13,cursor:"pointer"}}>Cancelar</button>
        <button onClick={()=>{if(hs!==""&&vs!=="")onSave(Number(hs),Number(vs));}} disabled={hs===""||vs===""}
          style={{flex:1,background:sport.primary,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:600,cursor:hs===""||vs===""?"not-allowed":"pointer",opacity:hs===""||vs===""?0.4:1}}>
          Confirmar
        </button>
      </div>
    </div>
  </div>);
}

function MatchupCard({game,savedOddsMap,onEdit,sport}){
  const {hPpg,aPpg,avg,proj,realTotal,result,overUnder,spread}=getGameStats(game,savedOddsMap,sport);
  const [histData,setHistData]=useState(null);
  if(!hPpg&&!aPpg)return null;
  const isBra=sport.id==="bra";
  const isFinal=game.status==="Final";
  const isLive=!isFinal&&game.status!=="Agendado";
  const hWin=isFinal&&game.hs>game.vs;
  const aWin=isFinal&&game.vs>game.hs;
  const hAbbr=game.home_abbr||game.home.split(" ").pop();
  const aAbbr=game.away_abbr||game.away.split(" ").pop();
  const dec=isBra?2:1;
  const topBar=isFinal&&result==="hit"?HIT_COLOR:isFinal&&result==="miss"?MISS_COLOR:isLive?GREEN:sport.primary+"44";
  const cardBorder=isFinal&&result==="hit"?`1px solid ${HIT_COLOR}33`:isFinal&&result==="miss"?`1px solid ${MISS_COLOR}33`:`1px solid ${BORDER}`;
  return(<div style={{background:SURFACE,border:cardBorder,borderRadius:12,overflow:"hidden",marginBottom:"1rem"}}>
    <div style={{height:3,background:topBar}}/>
    <div style={{padding:"1.25rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>

function BettingSimulator({schedule,dates,savedOddsMap,selDate,sport}){
  const isBra=sport.id==="bra";
  const [banca,setBanca]=useState(1000);
  const [minDiv,setMinDiv]=useState(sport.minDiv);
  const [kFr,setKFr]=useState(0.5);
  const [maxPct,setMaxPct]=useState(5);
  const wG=dates.flatMap(d=>(schedule[d]||[]).filter(g=>g.status==="Final"));
  const wO=wG.filter(g=>!!getGameStats(g,savedOddsMap,sport).overUnder);
  const hits=wO.filter(g=>getGameStats(g,savedOddsMap,sport).result==="hit");
  const acc=wO.length>0?hits.length/wO.length:0.55;
  const tG=(schedule[selDate]||[]).filter(g=>g.status!=="Final"&&!!getGameStats(g,savedOddsMap,sport).overUnder);
  const allocs=tG.map(g=>{
    const{proj,overUnder}=getGameStats(g,savedOddsMap,sport);
    const div=proj-overUnder;const absDiv=Math.abs(div);
    if(absDiv<minDiv)return{game:g,reason:"divergência insuficiente",alloc:0};
    const p=eProb(acc,div);const odds=1.91;const kf=kFrac(p,odds);
    if(kf<=0)return{game:g,reason:"edge negativo",alloc:0};
    const cp=Math.min(maxPct,kf*kFr*100);
    const alloc=parseFloat(((cp/100)*banca).toFixed(2));
    return{game:g,div,p,cp,alloc,side:div>0?"OVER":"UNDER",retorno:parseFloat((alloc*(odds-1)).toFixed(2)),overUnder,reason:null};
  });
  const elig=allocs.filter(a=>a.alloc>0);
  const excl=allocs.filter(a=>a.alloc===0);
  const tA=elig.reduce((s,a)=>s+a.alloc,0);
  const tR=elig.reduce((s,a)=>s+a.retorno,0);
  const dvStep=isBra?0.1:1;const dvMax=isBra?3:20;
  return(<div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1.25rem",marginBottom:"1.25rem"}}>
    <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"1rem"}}>Simulador — Kelly</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:"1.25rem"}}>
      {[["Banca (R$)",banca,setBanca,50,100000,50],[`Div. mín. (${sport.divLabel})`,minDiv,setMinDiv,dvStep,dvMax,dvStep],["Nível de risco",kFr,setKFr,0.1,1,0.05],["Teto/jogo (%)",maxPct,setMaxPct,1,20,1]].map(([l,v,sv,mn,mx,st])=>(
        <div key={l}>
          <div style={{fontSize:9,color:TEXT3,marginBottom:4}}>{l}</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input type="range" min={mn} max={mx} step={st} value={v} onChange={e=>sv(Number(e.target.value))} style={{flex:1}}/>
            <span style={{fontSize:13,fontWeight:700,color:TEXT,minWidth:40,textAlign:"right"}}>{v}</span>
          </div>
        </div>
      ))}
    </div>
    <div style={{background:SURFACE2,borderRadius:8,padding:"8px 12px",marginBottom:"1rem"}}>
      <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Acurácia (7 dias)</div>
      <div style={{fontSize:16,fontWeight:800,color:acc>=0.5?HIT_COLOR:MISS_COLOR}}>{hits.length}/{wO.length} — {Math.round(acc*100)}%</div>
    </div>
    {!tG.length&&<div style={{textAlign:"center",padding:"1.5rem 0",color:TEXT3,fontSize:12}}>Nenhum jogo com odds disponíveis.</div>}
    {elig.length>0&&(<>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Selecionados ({elig.length})</div>
      {elig.map(a=>{
        const hA=a.game.home_abbr||a.game.home.split(" ").pop();
        const aA=a.game.away_abbr||a.game.away.split(" ").pop();
        return(<div key={a.game.id} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:TEXT,marginBottom:4}}>{hA} vs {aA}</div>
              <div style={{fontSize:11,color:TEXT2}}>Apostar: <span style={{color:a.side==="OVER"?HIT_COLOR:"#6fa3ff",fontWeight:700}}>{a.side} {a.overUnder}</span></div>
              <div style={{fontSize:11,color:TEXT2}}>Diverg.: <span style={{color:TEXT}}>{a.div>0?"+":""}{a.div.toFixed(isBra?2:1)} {sport.divLabel}</span></div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:18,fontWeight:800,color:HIT_COLOR}}>R$ {a.alloc.toFixed(2)}</div>
              <div style={{fontSize:10,color:TEXT3}}>{a.cp.toFixed(1)}% da banca</div>
              <div style={{fontSize:10,color:TEXT3}}>ret.: R$ {a.retorno.toFixed(2)}</div>
            </div>
          </div>
        </div>);
      })}
      <div style={{background:SURFACE2,borderRadius:10,padding:"10px 12px",border:`1px solid ${BORDER}`}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[["Total alocado",`R$ ${tA.toFixed(2)}`],["% da banca",`${((tA/banca)*100).toFixed(1)}%`],["Ret. potencial",`R$ ${tR.toFixed(2)}`]].map(([l,v])=>(
            <div key={l} style={{textAlign:"center"}}>
              <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>{l}</div>
              <div style={{fontSize:14,fontWeight:700,color:TEXT}}>{v}</div>
            </div>
          ))}
        </div>
      </div>
    </>)}
    {excl.length>0&&<div style={{marginTop:"1rem"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Excluídos ({excl.length})</div>
      {excl.map(a=>{
        const hA=a.game.home_abbr||a.game.home.split(" ").pop();
        const aA=a.game.away_abbr||a.game.away.split(" ").pop();
        return(<div key={a.game.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",borderRadius:8,background:SURFACE2,marginBottom:4,opacity:0.5}}>
          <span style={{fontSize:11,color:TEXT2}}>{hA} vs {aA}</span>
          <span style={{fontSize:10,color:TEXT3}}>{a.reason}</span>
        </div>);
      })}
    </div>}
    <div style={{fontSize:9,color:TEXT3,marginTop:"1rem"}}>Odds padrão O/U: -110 (1.91x) · Modelo analítico</div>
  </div>);
}

function RulesAnalysis({schedule,dates,savedOddsMap,sport}){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const mountedRef=useRef(true);
  const isBra=sport.id==="bra";
  useEffect(()=>{mountedRef.current=true;return()=>{mountedRef.current=false;};},[]);
  useEffect(()=>{
    const finals=dates.flatMap(d=>(schedule[d]||[])).filter(g=>{
      if(g.status!=="Final")return false;
      const{overUnder,realTotal}=getGameStats(g,savedOddsMap,sport);
      return!!overUnder&&realTotal!=null;
    });
    if(!finals.length){setLoading(false);setRows([]);return;}
    setLoading(true);
    Promise.all(finals.map(async g=>{
      const{proj,overUnder,realTotal,avg}=getGameStats(g,savedOddsMap,sport);
      const hist=g.home_id&&g.away_id?await fetchHist(g.home_id,g.away_id,avg,sport):null;
      const sg1=s1(proj,overUnder),sg2=s2(proj,overUnder,hist),sg3=s3(hist),sg4=s4(proj,overUnder,hist),sg5=s5(proj,overUnder,hist,sport.minDiv);
      const r1=calcRS(sg1,overUnder,realTotal),r2=calcRS(sg2,overUnder,realTotal),r3=calcRS(sg3,overUnder,realTotal),r4=calcRS(sg4,overUnder,realTotal),r5=calcRS(sg5,overUnder,realTotal);
      const hA=g.home_abbr||g.home.split(" ").pop();
      const aA=g.away_abbr||g.away.split(" ").pop();
      const fields=hist?[
        {label:`${hA} temp.`,above:hist.home.above,total:hist.home.total},
        {label:`${hA} ult5`,above:hist.home.last5.above,total:hist.home.last5.total},
        {label:`${aA} def.t`,above:hist.away.above,total:hist.away.total},
        {label:`${aA} def.5`,above:hist.away.last5.above,total:hist.away.last5.total},
      ]:null;
      return{g,hA,aA,proj,overUnder,realTotal,sg1,sg2,sg3,sg4,sg5,r1,r2,r3,r4,r5,fields};
    })).then(res=>{if(mountedRef.current){setRows(res);setLoading(false);}});
  },[schedule,dates,savedOddsMap,sport]);

  const cnt=fn=>rows.filter(r=>fn(r)==="hit").length;
  const tot=fn=>rows.filter(r=>fn(r)==="hit"||fn(r)==="miss").length;
  const skp=fn=>rows.filter(r=>fn(r)==="skip").length;
  const pct=(h,t)=>t>0?Math.round((h/t)*100):0;
  const stats=[[cnt(r=>r.r1),tot(r=>r.r1),0],[cnt(r=>r.r2),tot(r=>r.r2),skp(r=>r.r2)],[cnt(r=>r.r3),tot(r=>r.r3),skp(r=>r.r3)],[cnt(r=>r.r4),tot(r=>r.r4),skp(r=>r.r4)],[cnt(r=>r.r5),tot(r=>r.r5),skp(r=>r.r5)]];
  const best=stats.map((s,i)=>({i:i+1,pct:pct(s[0],s[1])})).sort((a,b)=>b.pct-a.pct)[0]?.i;
  const sl=sport.statLabel;
  const LABELS=["Regra 1 — PPG vs Odd",`Regra 2 — ${sl} + Campos`,"Regra 3 — Só Campos","Regra 4 — Campos árbitro","Regra 5 — Convergência forte"];
  const DESCS=[`Proj ${sl} > Odd → OVER`,`Mesma dir. ${sl}, ≥3/4 campos`,"≥3 campos acima/abaixo",`Campos conflitam → seguir campos`,`${sl}+campos mesma dir. E div≥${sport.minDiv}`];

  if(loading)return<div style={{padding:"3rem 2rem",textAlign:"center",color:TEXT3,fontSize:13}}>Carregando análise...</div>;
  if(!rows.length)return<div style={{padding:"3rem 2rem",textAlign:"center",color:TEXT3,fontSize:13}}>Nenhum jogo finalizado com odds disponíveis.</div>;

  return(<div style={{padding:"1.5rem 2rem",maxWidth:1000,margin:"0 auto"}}>
    <div style={{marginBottom:"1.5rem"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:4}}>Análise comparativa</div>
      <div style={{fontSize:22,fontWeight:800,color:TEXT}}>Taxa de Acerto por Regra</div>
      <div style={{fontSize:12,color:TEXT2,marginTop:4}}>{rows.length} jogo(s){isBra?` · zona neutra: ±${sport.neutralZone} gols`:""}</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:"2rem"}}>
      {stats.map(([h,t,sk],i)=>{
        const p=pct(h,t);const isBest=(i+1)===best;
        return(<div key={i} style={{background:SURFACE,border:`2px solid ${isBest?YELLOW:BORDER}`,borderRadius:12,padding:"1.25rem",position:"relative",overflow:"hidden"}}>
          {isBest&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:YELLOW}}/>}
          {isBest&&<div style={{position:"absolute",top:8,right:10,fontSize:9,color:YELLOW,fontWeight:700}}>✦ Melhor</div>}
          <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>{LABELS[i]}</div>
          <div style={{fontSize:36,fontWeight:800,color:p>=50?HIT_COLOR:MISS_COLOR,lineHeight:1,marginBottom:4}}>{p}%</div>
          <div style={{fontSize:13,color:TEXT2,marginBottom:8}}>{h}/{t} acertos</div>
          {sk>0&&<div style={{fontSize:10,color:TEXT3,marginBottom:8}}>{sk} N/A</div>}
          <div style={{height:5,background:SURFACE2,borderRadius:3,overflow:"hidden",marginBottom:8}}>
            <div style={{width:`${p}%`,height:"100%",background:p>=50?HIT_COLOR:MISS_COLOR,borderRadius:3}}/>
          </div>
          <div style={{fontSize:9,color:TEXT3,lineHeight:1.5}}>{DESCS[i]}</div>
        </div>);
      })}
    </div>
    <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Detalhe por jogo</div>
    <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 4fr",gap:0,borderBottom:`1px solid ${BORDER}`,padding:"8px 14px"}}>
        {["Jogo","Real","O/U","R1","R2","R3","R4","R5 + campos"].map(h=>(
          <div key={h} style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>{h}</div>
        ))}
      </div>
      {rows.map(({g,hA,aA,overUnder,realTotal,sg1,sg2,sg3,sg4,sg5,r1,r2,r3,r4,r5,fields},idx)=>(
        <div key={g.id} style={{borderBottom:idx<rows.length-1?`1px solid ${BORDER}`:"none"}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 4fr",gap:0,padding:"10px 14px",alignItems:"center"}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:TEXT}}>{hA} vs {aA}</div>
              <div style={{fontSize:10,color:TEXT3}}>{g.home.split(" ").slice(-1)[0]} vs {g.away.split(" ").slice(-1)[0]}</div>
            </div>
            <div style={{fontSize:14,fontWeight:700,color:TEXT}}>{realTotal}</div>
            <div style={{fontSize:13,color:TEXT2}}>{overUnder?.toFixed(1)}</div>
            <div><RuleChip suggestion={sg1} result={r1}/></div>
            <div><RuleChip suggestion={sg2} result={r2}/></div>
            <div><RuleChip suggestion={sg3} result={r3}/></div>
            <div><RuleChip suggestion={sg4} result={r4}/></div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <RuleChip suggestion={sg5} result={r5}/>
              {fields&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:2}}>
                {fields.map(f=>{const ia=fieldIsAbove(f.above,f.total);return(
                  <span key={f.label} style={{fontSize:9,color:ia?GREEN:MISS_COLOR,background:ia?"rgba(0,200,83,0.08)":"rgba(200,16,46,0.08)",border:`1px solid ${ia?"rgba(0,200,83,0.2)":"rgba(200,16,46,0.2)"}`,borderRadius:4,padding:"1px 5px"}}>
                    {f.label} {f.above}/{f.total}
                  </span>
                );})}
              </div>}
            </div>
          </div>
        </div>
      ))}
    </div>
  </div>);
}

  const carouselRef=useRef(null);

    setSelDate(d);
  }

    setLoadings(p=>({...p,[sid]:true}));
    try{
      const start=loadDates[0].replace(/-/g,"");
      const end=loadDates[13].replace(/-/g,"");
      const ep=sid==="bra"?"/api/games-soccer":"/api/games";
      const r=await fetch(`${ep}?bust=${Date.now()}&start=${start}&end=${end}`);
      const d=await r.json();
      if(d.schedule){
        setSchedules(p=>({...p,[sid]:d.schedule}));
        setUpdatedAts(p=>({...p,[sid]:new Date()}));
        const all=Object.values(d.schedule).flat();
        await saveOddsToKV(all,SPORTS[sid]);
        const fids=all.filter(g=>g.status==="Final"&&!g.over_under).map(g=>String(g.id));
        if(fids.length){
          const om=await loadOddsFromKV(fids);
          setSavedOddsMaps(p=>({...p,[sid]:{...p[sid],...om}}));
        }
      }
    }catch(e){console.error(e);}
    finally{setLoadings(p=>({...p,[sid]:false}));}
  }

  useEffect(()=>{
    loadSport("nba");loadSport("bra");
    const id=setInterval(()=>{loadSport("nba");loadSport("bra");},30*60*1000);
    return()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    if(!carouselRef.current)return;
    const btn=carouselRef.current.querySelector("[data-today='true']");
    if(btn)btn.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  },[sportId,activeTab]);

  const selGames=schedule[selDate]||[];
  const finals=selGames.filter(g=>g.status==="Final").length;

  function handleSave(hs,vs){
    setSchedules(p=>({...p,[sportId]:{...p[sportId],[selDate]:p[sportId][selDate].map(g=>g.id===editing.id?{...g,hs,vs,status:"Final"}:g)}}));
    setEditing(null);
  }

  return(<div style={{background:BG,minHeight:"100vh",fontFamily:"inherit"}}>
    {editing&&<EditModal game={editing} onSave={handleSave} onClose={()=>setEditing(null)} sport={sport}/>}

    {/* Header */}
    <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`}}>
      <div style={{maxWidth:1800,margin:"0 auto",padding:"1rem 2rem 0"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{display:"flex",border:`1px solid ${BORDER}`,borderRadius:8,overflow:"hidden",flexShrink:0}}>
              {Object.values(SPORTS).map(sp=>(
                <button key={sp.id} onClick={()=>{setSportId(sp.id);setActiveTab("jogos");}}
                  style={{padding:"7px 16px",fontSize:12,fontWeight:sportId===sp.id?700:400,
                    background:sportId===sp.id?sp.primary:"transparent",
                    color:sportId===sp.id?"#fff":TEXT2,border:"none",cursor:"pointer",
                    borderRight:sp.id==="nba"?`1px solid ${BORDER}`:"none"}}>
                  {sp.icon} {sp.label}
                </button>
              ))}
            </div>
            <div>
              <div style={{fontSize:9,color:TEXT2,textTransform:"uppercase",letterSpacing:"0.15em",fontWeight:600}}>{sport.season}</div>
              <div style={{fontSize:26,fontWeight:800,color:TEXT,letterSpacing:"-0.5px"}}>Análise de Confrontos</div>
            </div>
          </div>
          <div style={{textAlign:"right",fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>
            {updatedAt?"ESPN · "+updatedAt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"carregando..."}
          </div>
        </div>
        <div style={{display:"flex"}}>
          {[["jogos","📅 Jogos"],["regras","📊 Análise de regras"]].map(([tab,label])=>(
            <button key={tab} onClick={()=>setActiveTab(tab)} style={{
              background:"transparent",color:activeTab===tab?TEXT:TEXT3,border:"none",
              borderBottom:activeTab===tab?`3px solid ${sport.secondary}`:`3px solid transparent`,
              padding:"8px 18px 10px",cursor:"pointer",fontSize:12,
              fontWeight:activeTab===tab?700:400,borderRadius:"4px 4px 0 0",
            }}>{label}</button>
          ))}
        </div>
      </div>
    </div>

    {/* Carrossel */}
    {activeTab==="jogos"&&(
      <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"stretch"}}>
        {/* Seta esquerda — aparece se há dias antes do visível */}
        {visibleDates[0]>minSelStr?(
          <button onClick={()=>handleSelectDate(dateAdd(selDate,-1))} style={{
            flexShrink:0,width:40,background:"transparent",border:"none",
            borderBottom:`3px solid transparent`,borderRight:`1px solid ${BORDER}`,
            color:TEXT2,cursor:"pointer",fontSize:32,display:"flex",alignItems:"center",justifyContent:"center",
          }}>‹</button>
        ):<div style={{width:40,flexShrink:0,borderRight:`1px solid ${BORDER}`}}/>}

        {/* Dias — flex:1 para preencher todo o espaço */}
        <div style={{flex:1,display:"flex"}}>
          {visibleDates.map(d=>{
            const isToday=d===todayStr,isSel=d===selDate,isPast=d<todayStr;
            const games=schedule[d]||[];
            const fin=games.filter(g=>g.status==="Final").length,tot=games.length;
            const dayName=DAYS_PT[new Date(d+"T12:00:00").getDay()];
            const dayNum=new Date(d+"T12:00:00").getDate();
            const dHits=games.filter(g=>g.status==="Final"&&getGameStats(g,savedOddsMap,sport).result==="hit").length;
            const dOdds=games.filter(g=>g.status==="Final"&&!!getGameStats(g,savedOddsMap,sport).overUnder).length;
            return(
              <button key={d} data-today={isToday?"true":undefined} onClick={()=>handleSelectDate(d)} style={{
                flex:1,
                background:isSel?sport.primary:"transparent",
                color:isSel?"#fff":isToday?sport.primary:isPast?TEXT3:TEXT2,
                border:"none",
                borderBottom:isSel?`3px solid ${sport.secondary}`:isToday?`3px solid ${sport.primary}`:"3px solid transparent",
                padding:"8px 4px 10px",cursor:"pointer",
                display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                borderRadius:"4px 4px 0 0",
              }}>
                <span style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>{dayName}</span>
                <span style={{fontSize:15,fontWeight:800}}>{dayNum}</span>
                <span style={{fontSize:9,color:isSel?"rgba(255,255,255,0.6)":TEXT3}}>{tot>0?(fin>0?`${fin}/${tot}`:`${tot}j`):"—"}</span>
                {dOdds>0&&<span style={{fontSize:8,color:isSel?"rgba(255,255,255,0.5)":dHits/dOdds>=0.5?"rgba(0,200,83,0.8)":"rgba(200,16,46,0.8)"}}>{dHits}/{dOdds}</span>}
              </button>
            );
          })}
        </div>

        {/* Seta direita — aparece se há dias depois do visível */}
        {visibleDates[visibleDates.length-1]<maxSelStr?(
          <button onClick={()=>handleSelectDate(dateAdd(selDate,1))} style={{
            flexShrink:0,width:40,background:"transparent",border:"none",
            borderBottom:`3px solid transparent`,borderLeft:`1px solid ${BORDER}`,
            color:TEXT2,cursor:"pointer",fontSize:32,display:"flex",alignItems:"center",justifyContent:"center",
          }}>›</button>
        ):<div style={{width:40,flexShrink:0,borderLeft:`1px solid ${BORDER}`}}/>}
      </div>
    )}

    {/* Tab: Jogos */}
    {activeTab==="jogos"&&(
      <div style={{display:"grid",gridTemplateColumns:"1fr 460px",gap:0,alignItems:"start",width:"100%"}}>
        <div style={{maxWidth:760,margin:"0 auto",width:"100%",padding:"1.25rem 0 1.25rem 2rem"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:"1.25rem"}}>
            {[["Jogos",selGames.length||"—"],["Finalizados",finals||"—"],[sport.id==="bra"?"Rodada":"Jogos hoje",sport.id==="bra"?(selGames[0]?.round||"—"):selGames.length||"—"]].map(([l,v])=>(
              <div key={l} style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:10,padding:"0.75rem 1rem"}}>
                <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>{l}</div>
                <div style={{fontSize:20,fontWeight:800,color:TEXT}}>{v}</div>
              </div>
            ))}
          </div>
          <AccuracyReport schedule={schedule} dates={loadDates} selDate={selDate} savedOddsMap={savedOddsMap} sport={sport}/>
          {loading&&<div style={{textAlign:"center",padding:"3rem 0",color:TEXT3,fontSize:13}}>Carregando jogos...</div>}
          {!loading&&selGames.length===0&&<div style={{textAlign:"center",padding:"3rem 0",color:TEXT3,fontSize:13}}>Nenhum jogo para este dia.</div>}
          {selGames.map(g=><MatchupCard key={g.id} game={g} savedOddsMap={savedOddsMap} onEdit={setEditing} sport={sport}/>)}
          <div style={{fontSize:9,color:TEXT3,marginTop:"1rem",textAlign:"center",letterSpacing:"0.05em"}}>
            {sport.id==="bra"?"Dados: ESPN API (bra.1) · Atualização a cada 30 min":"Jogos, PPG, odds e histórico: ESPN API · Atualização a cada 30 min"}
          </div>
        </div>
        <div style={{position:"sticky",top:0,height:"100vh",overflowY:"auto",borderLeft:`1px solid ${BORDER}`,background:SURFACE}}>
          <div style={{padding:"1.25rem"}}>
            <BettingSimulator schedule={schedule} dates={loadDates} savedOddsMap={savedOddsMap} selDate={selDate} sport={sport}/>
          </div>
        </div>
      </div>
    )}

    {/* Tab: Regras */}
    {activeTab==="regras"&&(
      <RulesAnalysis schedule={schedule} dates={loadDates} savedOddsMap={savedOddsMap} sport={sport}/>
    )}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
