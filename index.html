// ── Dates ─────────────────────────────────────────────────────────
function getBrazilToday(){return new Date(Date.now()-3*60*60*1000).toISOString().split("T")[0];}
function getLoadDates(){
  const b=new Date(Date.now()-3*60*60*1000);
  return Array.from({length:14},(_,i)=>{const d=new Date(b);d.setDate(b.getDate()-(6-i));return d.toISOString().split("T")[0];});
}
function getVisibleDates(sel,today){
  const t=new Date(today+"T12:00:00"),s=new Date(sel+"T12:00:00");
  const mn=new Date(t);mn.setDate(t.getDate()-6);
  const mx=new Date(t);mx.setDate(t.getDate()+7);
  const anc=new Date(s);anc.setDate(s.getDate()+1);
  const end=anc>mx?mx:anc;
  return Array.from({length:8},(_,i)=>{const d=new Date(end);d.setDate(end.getDate()-(7-i));return d.toISOString().split("T")[0];})
    .filter(d=>d>=mn.toISOString().split("T")[0]&&d<=mx.toISOString().split("T")[0]);
}
function dateAdd(s,n){const d=new Date(s+"T12:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}

// ── KV ────────────────────────────────────────────────────────────
async function saveOddsToKV(games,sport){
  const isBra=sport?.id==="bra";
  const ts=games.filter(g=>g.status!=="Final"&&g.over_under).map(g=>({
    id:g.id,over_under:g.over_under,spread:g.spread||null,
    proj:isBra?parseFloat(((g.home_ppg||0)+(g.away_ppg||0))/2):(g.home_ppg||0)+(g.away_ppg||0),
    home_ppg:g.home_ppg||null,away_ppg:g.away_ppg||null,
  }));
  if(!ts.length)return;
  try{await fetch("/api/save-odds",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({games:ts})});}
  catch(e){console.error(e);}
}
async function loadOddsFromKV(ids){
  if(!ids.length)return{};
  try{const r=await fetch(`/api/get-odds?ids=${ids.join(",")}`);const d=await r.json();return d.odds||{};}
  catch{return{};}
}

// ── Stats ─────────────────────────────────────────────────────────
function getFB(sport,name){return sport.id==="nba"?(PPG_FB[name]||0):(GPJ_FB[name]||1.3);}
function calcResult(proj,ou,real){if(!ou||real==null)return null;return(proj>ou)===(real>ou)?"hit":"miss";}
function getGameStats(game,om,sport){
  const isBra=sport.id==="bra";
  const sv=om?.[String(game.id)];
  const fin=game.status==="Final";
  const hp=sv?.home_ppg||game.home_ppg||getFB(sport,game.home);
  const ap=sv?.away_ppg||game.away_ppg||getFB(sport,game.away);
  const ou=game.over_under||sv?.over_under||null;
  const sp=game.spread||sv?.spread||null;
  let proj,avg;
  if(isBra){proj=(fin&&sv?.proj)?sv.proj:parseFloat(((hp+ap)/2).toFixed(2));avg=proj;}
  else{proj=(fin&&sv?.proj)?sv.proj:(hp+ap);avg=parseFloat((proj/2).toFixed(1));}
  const real=(game.hs!=null&&game.vs!=null)?(isBra?game.hs:game.hs+game.vs):null;
  const vou=ou&&(!isBra||ou<=3.5)?ou:null;
  const res=fin?calcResult(sv?.proj||proj,vou,real):null;
  return{hPpg:hp,aPpg:ap,avg,proj,realTotal:real,result:res,overUnder:vou,spread:sp};
}

// ── League base rate ──────────────────────────────────────────────
function calcLeagueBaseRate(schedule,dates){
  const finals=dates.flatMap(d=>(schedule[d]||[])).filter(g=>g.status==="Final"&&g.hs!=null);
  if(!finals.length)return 0.65;
  return parseFloat((finals.filter(g=>g.hs>0).length/finals.length).toFixed(3));
}

// ── NBA suggestions ───────────────────────────────────────────────
function fieldIsAbove(a,t){return t>0&&a*2>=t;}
function countFields(h){
  if(!h)return{above:0,below:0,total:0};
  const fs=[{above:h.home.above,total:h.home.total},{above:h.home.last5.above,total:h.home.last5.total},{above:h.away.above,total:h.away.total},{above:h.away.last5.above,total:h.away.last5.total}];
  let above=0,below=0,valid=0;
  for(const f of fs){if(!f.total)continue;valid++;if(fieldIsAbove(f.above,f.total))above++;else below++;}
  return{above,below,total:valid};
}
function s1(p,ou){if(!ou)return null;return p>ou?"OVER":p<ou?"UNDER":null;}
function s2(p,ou,h){const b=s1(p,ou);if(!b||!h)return null;const{above,below,total}=countFields(h);if(total<3)return null;if(b==="OVER"&&above>=3)return"OVER";if(b==="UNDER"&&below>=3)return"UNDER";return"NÃO APOSTE";}
function s3(h){if(!h)return null;const{above,below,total}=countFields(h);if(total<3)return null;if(above>=3)return"OVER";if(below>=3)return"UNDER";return"NÃO APOSTE";}
function s4(p,ou,h){const b=s1(p,ou);if(!b)return null;if(!h)return b;const{above,below,total}=countFields(h);if(total<3)return b;const cd=above>=3?"OVER":below>=3?"UNDER":null;if(!cd)return b;if(cd===b)return b;return cd;}
function s5(p,ou,h,md){const b=s1(p,ou);if(!b||!ou||!h)return null;const{above,below,total}=countFields(h);if(total<3)return null;if(Math.abs(p-ou)<md)return"NÃO APOSTE";const cd=above>=3?"OVER":below>=3?"UNDER":null;if(!cd||cd!==b)return"NÃO APOSTE";return b;}
function calcRS(sg,ou,real){if(!sg||!ou||real==null)return null;if(sg==="NÃO APOSTE")return"skip";return sg==="OVER"?(real>ou?"hit":"miss"):(real<=ou?"hit":"miss");}

// ── Hist cache ────────────────────────────────────────────────────
const HC={};
async function fetchHist(hid,aid,avg,sport,baseRate){
  const ep=sport.id==="bra"?"/api/history-soccer":"/api/history";
  const br=sport.id==="bra"&&baseRate?`&league_base_rate=${baseRate}`:"";
  const k=`${sport.id}_${hid}_${aid}_${avg}_${baseRate||""}`;
  if(HC[k])return HC[k];
  try{const r=await fetch(`${ep}?home_id=${hid}&away_id=${aid}&matchup_avg=${avg}${br}`);const d=await r.json();HC[k]=d;return d;}
  catch{return null;}
}

// ── Kelly ─────────────────────────────────────────────────────────
function kFrac(p,o){const b=o-1,q=1-p;return(b*p-q)/b;}
function eProb(acc,div){return Math.min(0.75,Math.min(0.75,Math.max(0.4,acc))+Math.min(0.10,(Math.abs(div)/5)*0.02));}

function ScoreBar({above,total}){
  const pct=total>0?(above/total)*100:0,col=pct>=50?GREEN:MISS_COLOR;
  return(<div style={{display:"flex",alignItems:"center",gap:6}}>
    <div style={{flex:1,height:4,background:SURFACE2,borderRadius:2,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:2}}/></div>
    <span style={{fontSize:11,fontWeight:500,color:col,minWidth:32,textAlign:"right"}}>{above}/{total}</span>
  </div>);
}

function RuleChip({suggestion,result}){
  const skip=!suggestion||suggestion==="NÃO APOSTE";
  const col=skip?TEXT3:(suggestion==="OVER"||suggestion==="APOSTAR")?GREEN:"#6fa3ff";
  const bg=skip?"rgba(80,80,80,0.15)":(suggestion==="OVER"||suggestion==="APOSTAR")?"rgba(0,200,83,0.12)":"rgba(29,66,138,0.2)";
  const bd=skip?"rgba(80,80,80,0.3)":(suggestion==="OVER"||suggestion==="APOSTAR")?"rgba(0,200,83,0.3)":"rgba(29,66,138,0.5)";
  const ic=result==="hit"?" ✓":result==="miss"?" ✗":result==="skip"?" —":"";
  const icCol=result==="hit"?HIT_COLOR:result==="miss"?MISS_COLOR:TEXT3;
  return(<span style={{display:"inline-flex",alignItems:"center",gap:2,padding:"2px 8px",borderRadius:6,background:bg,border:`1px solid ${bd}`,fontSize:11,fontWeight:700,color:col}}>
    {skip?"N/A":suggestion}{ic&&<span style={{color:icCol}}>{ic}</span>}
  </span>);
}

function AccuracyReport({schedule,dates,selDate,om,sport}){
  const dG=(schedule[selDate]||[]).filter(g=>g.status==="Final");
  const wG=dates.flatMap(d=>(schedule[d]||[]).filter(g=>g.status==="Final"));
  const ch=gs=>{const wo=gs.filter(g=>!!getGameStats(g,om,sport).overUnder);return{hits:wo.filter(g=>getGameStats(g,om,sport).result==="hit").length,total:wo.length};};
  const day=ch(dG),week=ch(wG);
  if(!day.total&&!week.total)return null;
  const pct=(h,t)=>t>0?Math.round((h/t)*100):0;
  return(<div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1rem 1.25rem",marginBottom:"1.25rem",display:"flex",gap:"1.5rem",alignItems:"center"}}>
    <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",flexShrink:0}}>Precisão O/U</div>
    {day.total>0&&(<><div><div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Hoje</div><div style={{fontSize:18,fontWeight:800,color:pct(day.hits,day.total)>=50?HIT_COLOR:MISS_COLOR}}>{day.hits}/{day.total}</div><div style={{fontSize:9,color:TEXT3}}>{pct(day.hits,day.total)}%</div></div><div style={{width:1,height:36,background:BORDER}}/></>)}
    {week.total>0&&(<><div><div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Últimos 7 dias</div><div style={{fontSize:18,fontWeight:800,color:pct(week.hits,week.total)>=50?HIT_COLOR:MISS_COLOR}}>{week.hits}/{week.total}</div><div style={{fontSize:9,color:TEXT3}}>{pct(week.hits,week.total)}%</div></div>
    <div style={{flex:1,height:6,background:SURFACE2,borderRadius:3,overflow:"hidden",maxWidth:120}}><div style={{width:`${pct(week.hits,week.total)}%`,height:"100%",background:pct(week.hits,week.total)>=50?HIT_COLOR:MISS_COLOR,borderRadius:3}}/></div></>)}
  </div>);
}

function OddsPanel({proj,overUnder,spread,result,realTotal,sport}){
  if(!overUnder)return null;
  const isBra=sport.id==="bra";
  const diff=proj-overUnder;
  const col=Math.abs(diff)>=(isBra?0.3:3)?(diff>0?GREEN:MISS_COLOR):TEXT2;
  return(<div style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:10,padding:"1rem",marginTop:"1rem"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em"}}>Odds {isBra?"bet365":"DraftKings"}</div>
      {result&&<div style={{padding:"2px 10px",borderRadius:20,background:result==="hit"?"rgba(0,200,83,0.15)":"rgba(200,16,46,0.15)",border:`1px solid ${result==="hit"?"rgba(0,200,83,0.4)":"rgba(200,16,46,0.4)"}`}}>
        <span style={{fontSize:10,fontWeight:700,color:result==="hit"?HIT_COLOR:MISS_COLOR}}>{result==="hit"?"✓ Acerto":"✗ Erro"} · Real: {realTotal} {sport.divLabel}</span>
      </div>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:"0.75rem"}}>
      {[["Linha O/U",overUnder.toFixed(1)],[`Proj. ${sport.statLabel}`,proj.toFixed(isBra?2:1)],["Diferença",(diff>0?"+":"")+diff.toFixed(isBra?2:1)]].map(([l,v],i)=>(
        <div key={l} style={{textAlign:"center"}}><div style={{fontSize:9,color:TEXT3,marginBottom:3}}>{l}</div><div style={{fontSize:16,fontWeight:700,color:i===2?col:TEXT}}>{v}</div></div>

        <span style={{fontSize:11,fontWeight:700,color:diff>0?GREEN:MISS_COLOR}}>{sport.statLabel} sugere {diff>0?"OVER":"UNDER"} {overUnder.toFixed(1)}</span>
      </div>
      {spread&&<div style={{padding:"3px 12px",borderRadius:20,background:SURFACE,border:`1px solid ${BORDER}`}}><span style={{fontSize:11,color:TEXT2}}>{isBra?"Handicap":"Spread"}: {spread}</span></div>}
    </div>)}
  </div>);
}

function HistoryPanel({homeId,awayId,matchupAvg,homeAbbr,awayAbbr,sport,onLoaded,leagueBaseRate}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(false);
  const isBra=sport.id==="bra";
  useEffect(()=>{
    if(!homeId||!awayId)return;
    setLoading(true);setError(false);
    const ep=isBra?"/api/history-soccer":"/api/history";
    const br=isBra&&leagueBaseRate?`&league_base_rate=${leagueBaseRate}`:"";

function BettingSimulator({schedule,dates,om,selDate,sport}){
  const isBra=sport.id==="bra";
  const [banca,setBanca]=useState(1000);
  const [minDiv,setMinDiv]=useState(sport.minDiv);
  const [kFr,setKFr]=useState(0.5);
  const [maxPct,setMaxPct]=useState(5);
  const wG=dates.flatMap(d=>(schedule[d]||[]).filter(g=>g.status==="Final"));
  const wO=wG.filter(g=>!!getGameStats(g,om,sport).overUnder);
  const hits=wO.filter(g=>getGameStats(g,om,sport).result==="hit");
  const acc=wO.length>0?hits.length/wO.length:0.55;
  const tG=(schedule[selDate]||[]).filter(g=>g.status!=="Final"&&!!getGameStats(g,om,sport).overUnder);
  const allocs=tG.map(g=>{
    const{proj,overUnder}=getGameStats(g,om,sport);
    const div=proj-overUnder;const absDiv=Math.abs(div);
    if(absDiv<minDiv)return{game:g,reason:"divergência insuficiente",alloc:0};
    const p=eProb(acc,div);const odds=1.91;const kf=kFrac(p,odds);
    if(kf<=0)return{game:g,reason:"edge negativo",alloc:0};
    const cp=Math.min(maxPct,kf*kFr*100);
    const alloc=parseFloat(((cp/100)*banca).toFixed(2));
    return{game:g,div,p,cp,alloc,side:div>0?"OVER":"UNDER",retorno:parseFloat((alloc*(odds-1)).toFixed(2)),overUnder,reason:null};
  });
  const elig=allocs.filter(a=>a.alloc>0),excl=allocs.filter(a=>a.alloc===0);
  const tA=elig.reduce((s,a)=>s+a.alloc,0),tR=elig.reduce((s,a)=>s+a.retorno,0);
  const dvS=isBra?0.1:1,dvM=isBra?3:20;
  return(<div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1.25rem",marginBottom:"1.25rem"}}>
    <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"1rem"}}>Simulador — Kelly</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:"1.25rem"}}>
      {[["Banca (R$)",banca,setBanca,50,100000,50],[`Div. mín. (${sport.divLabel})`,minDiv,setMinDiv,dvS,dvM,dvS],["Nível de risco",kFr,setKFr,0.1,1,0.05],["Teto/jogo (%)",maxPct,setMaxPct,1,20,1]].map(([l,v,sv,mn,mx,st])=>(
        <div key={l}><div style={{fontSize:9,color:TEXT3,marginBottom:4}}>{l}</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><input type="range" min={mn} max={mx} step={st} value={v} onChange={e=>sv(Number(e.target.value))} style={{flex:1}}/><span style={{fontSize:13,fontWeight:700,color:TEXT,minWidth:40,textAlign:"right"}}>{v}</span></div></div>
      ))}
    </div>
    <div style={{background:SURFACE2,borderRadius:8,padding:"8px 12px",marginBottom:"1rem"}}>
      <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Acurácia (7 dias)</div>
      <div style={{fontSize:16,fontWeight:800,color:acc>=0.5?HIT_COLOR:MISS_COLOR}}>{hits.length}/{wO.length} — {Math.round(acc*100)}%</div>
    </div>
    {!tG.length&&<div style={{textAlign:"center",padding:"1.5rem 0",color:TEXT3,fontSize:12}}>Nenhum jogo com odds disponíveis.</div>}
    {elig.length>0&&(<>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Selecionados ({elig.length})</div>
      {elig.map(a=>{
        const hA=a.game.home_abbr||a.game.home.split(" ").pop(),aA=a.game.away_abbr||a.game.away.split(" ").pop();
        return(<div key={a.game.id} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div><div style={{fontSize:14,fontWeight:700,color:TEXT,marginBottom:4}}>{hA} vs {aA}</div>
            <div style={{fontSize:11,color:TEXT2}}>Apostar: <span style={{color:a.side==="OVER"?HIT_COLOR:"#6fa3ff",fontWeight:700}}>{a.side} {a.overUnder}</span></div>
            <div style={{fontSize:11,color:TEXT2}}>Diverg.: <span style={{color:TEXT}}>{a.div>0?"+":""}{a.div.toFixed(isBra?2:1)} {sport.divLabel}</span></div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:800,color:HIT_COLOR}}>R$ {a.alloc.toFixed(2)}</div>
            <div style={{fontSize:10,color:TEXT3}}>{a.cp.toFixed(1)}% da banca</div>
            <div style={{fontSize:10,color:TEXT3}}>ret.: R$ {a.retorno.toFixed(2)}</div></div>
          </div>
        </div>);
      })}
      <div style={{background:SURFACE2,borderRadius:10,padding:"10px 12px",border:`1px solid ${BORDER}`}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[["Total alocado",`R$ ${tA.toFixed(2)}`],["% da banca",`${((tA/banca)*100).toFixed(1)}%`],["Ret. potencial",`R$ ${tR.toFixed(2)}`]].map(([l,v])=>(
            <div key={l} style={{textAlign:"center"}}><div style={{fontSize:9,color:TEXT3,marginBottom:2}}>{l}</div><div style={{fontSize:14,fontWeight:700,color:TEXT}}>{v}</div></div>
          ))}
        </div>
      </div>
    </>)}
    {excl.length>0&&<div style={{marginTop:"1rem"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Excluídos ({excl.length})</div>
      {excl.map(a=>{const hA=a.game.home_abbr||a.game.home.split(" ").pop(),aA=a.game.away_abbr||a.game.away.split(" ").pop();
        return(<div key={a.game.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",borderRadius:8,background:SURFACE2,marginBottom:4,opacity:0.5}}>
          <span style={{fontSize:11,color:TEXT2}}>{hA} vs {aA}</span><span style={{fontSize:10,color:TEXT3}}>{a.reason}</span>
        </div>);
      })}
    </div>}
    <div style={{fontSize:9,color:TEXT3,marginTop:"1rem"}}>Odds padrão O/U: -110 (1.91x) · Modelo analítico</div>
  </div>);
}

// ── RulesAnalysis NBA ─────────────────────────────────────────────
function RulesAnalysisNBA({schedule,dates,om,sport}){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const mountedRef=useRef(true);
  useEffect(()=>{mountedRef.current=true;return()=>{mountedRef.current=false;};},[]);
  useEffect(()=>{
    const finals=dates.flatMap(d=>(schedule[d]||[])).filter(g=>{
      if(g.status!=="Final")return false;
      const{overUnder,realTotal}=getGameStats(g,om,sport);
      return!!overUnder&&realTotal!=null;
    });
    if(!finals.length){setLoading(false);setRows([]);return;}
    setLoading(true);
    Promise.all(finals.map(async g=>{
      const{proj,overUnder,realTotal,avg}=getGameStats(g,om,sport);
      const hist=g.home_id&&g.away_id?await fetchHist(g.home_id,g.away_id,avg,sport):null;
      const sg1=s1(proj,overUnder),sg2=s2(proj,overUnder,hist),sg3=s3(hist),sg4=s4(proj,overUnder,hist),sg5=s5(proj,overUnder,hist,sport.minDiv);
      const r1=calcRS(sg1,overUnder,realTotal),r2=calcRS(sg2,overUnder,realTotal),r3=calcRS(sg3,overUnder,realTotal),r4=calcRS(sg4,overUnder,realTotal),r5=calcRS(sg5,overUnder,realTotal);
      const hA=g.home_abbr||g.home.split(" ").pop(),aA=g.away_abbr||g.away.split(" ").pop();
      const fields=hist?[{label:`${hA} temp.`,above:hist.home.above,total:hist.home.total},{label:`${hA} ult5`,above:hist.home.last5.above,total:hist.home.last5.total},{label:`${aA} def.t`,above:hist.away.above,total:hist.away.total},{label:`${aA} def.5`,above:hist.away.last5.above,total:hist.away.last5.total}]:null;
      return{g,hA,aA,proj,overUnder,realTotal,sg1,sg2,sg3,sg4,sg5,r1,r2,r3,r4,r5,fields};
    })).then(res=>{if(mountedRef.current){setRows(res);setLoading(false);}});
  },[schedule,dates,om,sport]);

  const cnt=fn=>rows.filter(r=>fn(r)==="hit").length;
  const tot=fn=>rows.filter(r=>fn(r)==="hit"||fn(r)==="miss").length;
  const skp=fn=>rows.filter(r=>fn(r)==="skip").length;
  const pct=(h,t)=>t>0?Math.round((h/t)*100):0;
  const stats=[[cnt(r=>r.r1),tot(r=>r.r1),0],[cnt(r=>r.r2),tot(r=>r.r2),skp(r=>r.r2)],[cnt(r=>r.r3),tot(r=>r.r3),skp(r=>r.r3)],[cnt(r=>r.r4),tot(r=>r.r4),skp(r=>r.r4)],[cnt(r=>r.r5),tot(r=>r.r5),skp(r=>r.r5)]];
  const best=stats.map((s,i)=>({i:i+1,pct:pct(s[0],s[1])})).sort((a,b)=>b.pct-a.pct)[0]?.i;
  const sl=sport.statLabel;
  const LABELS=["Regra 1","Regra 2","Regra 3","Regra 4","Regra 5"];
  const DESCS=[`Proj ${sl} vs Odd`,`${sl} + ≥3 campos`,`Só campos`,`Campos árbitro`,`Convergência forte`];

  if(loading)return<div style={{padding:"3rem",textAlign:"center",color:TEXT3,fontSize:13}}>Carregando...</div>;
  if(!rows.length)return<div style={{padding:"3rem",textAlign:"center",color:TEXT3,fontSize:13}}>Nenhum jogo com odds disponíveis.</div>;
  return(<div style={{padding:"1.5rem 2rem",maxWidth:1000,margin:"0 auto"}}>
    <div style={{marginBottom:"1.5rem"}}><div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:4}}>Análise — NBA</div><div style={{fontSize:22,fontWeight:800,color:TEXT}}>Taxa de Acerto por Regra</div><div style={{fontSize:12,color:TEXT2,marginTop:4}}>{rows.length} jogo(s) com odds</div></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:"2rem"}}>
      {stats.map(([h,t,sk],i)=>{const p=pct(h,t),isBest=(i+1)===best;
        return(<div key={i} style={{background:SURFACE,border:`2px solid ${isBest?YELLOW:BORDER}`,borderRadius:12,padding:"1.25rem",position:"relative",overflow:"hidden"}}>
          {isBest&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:YELLOW}}/>}
          {isBest&&<div style={{position:"absolute",top:8,right:10,fontSize:9,color:YELLOW,fontWeight:700}}>✦ Melhor</div>}
          <div style={{fontSize:9,color:TEXT3,marginBottom:6}}>{LABELS[i]}</div>
          <div style={{fontSize:32,fontWeight:800,color:p>=50?HIT_COLOR:MISS_COLOR,lineHeight:1,marginBottom:4}}>{p}%</div>
          <div style={{fontSize:13,color:TEXT2,marginBottom:8}}>{h}/{t}</div>
          {sk>0&&<div style={{fontSize:10,color:TEXT3,marginBottom:8}}>{sk} N/A</div>}
          <div style={{height:5,background:SURFACE2,borderRadius:3,overflow:"hidden",marginBottom:8}}><div style={{width:`${p}%`,height:"100%",background:p>=50?HIT_COLOR:MISS_COLOR,borderRadius:3}}/></div>
          <div style={{fontSize:9,color:TEXT3}}>{DESCS[i]}</div>
        </div>);
      })}
    </div>
    <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 4fr",gap:0,borderBottom:`1px solid ${BORDER}`,padding:"8px 14px"}}>
        {["Jogo","Real","O/U","R1","R2","R3","R4","R5+campos"].map(h=><div key={h} style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</div>)}
      </div>
      {rows.map(({g,hA,aA,overUnder,realTotal,sg1,sg2,sg3,sg4,sg5,r1,r2,r3,r4,r5,fields},idx)=>(
        <div key={g.id} style={{borderBottom:idx<rows.length-1?`1px solid ${BORDER}`:"none"}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 4fr",gap:0,padding:"8px 14px",alignItems:"center"}}>
            <div><div style={{fontSize:12,fontWeight:700,color:TEXT}}>{hA} vs {aA}</div></div>
            <div style={{fontSize:13,fontWeight:700,color:TEXT}}>{realTotal}</div>
            <div style={{fontSize:12,color:TEXT2}}>{overUnder?.toFixed(1)}</div>
            <div><RuleChip suggestion={sg1} result={r1}/></div>
            <div><RuleChip suggestion={sg2} result={r2}/></div>
            <div><RuleChip suggestion={sg3} result={r3}/></div>
            <div><RuleChip suggestion={sg4} result={r4}/></div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <RuleChip suggestion={sg5} result={r5}/>
              {fields&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:2}}>
                {fields.map(f=>{const ia=fieldIsAbove(f.above,f.total);return(<span key={f.label} style={{fontSize:9,color:ia?GREEN:MISS_COLOR,background:ia?"rgba(0,200,83,0.08)":"rgba(200,16,46,0.08)",border:`1px solid ${ia?"rgba(0,200,83,0.2)":"rgba(200,16,46,0.2)"}`,borderRadius:4,padding:"1px 4px"}}>{f.label} {f.above}/{f.total}</span>);})}
              </div>}
            </div>
          </div>
        </div>
      ))}
    </div>
  </div>);
}

// ── RulesAnalysis Brasileirão ─────────────────────────────────────
function RulesAnalysisSoccer({schedule,dates,om,sport}){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const mountedRef=useRef(true);
  useEffect(()=>{mountedRef.current=true;return()=>{mountedRef.current=false;};},[]);
  const leagueBaseRate=calcLeagueBaseRate(schedule,dates);
  useEffect(()=>{
    const finals=dates.flatMap(d=>(schedule[d]||[])).filter(g=>g.status==="Final");
    if(!finals.length){setLoading(false);setRows([]);return;}
    setLoading(true);
    Promise.all(finals.map(async g=>{
      const{avg,realTotal}=getGameStats(g,om,sport);
      if(!g.home_id||!g.away_id||realTotal==null)return null;
      const hA=g.home_abbr||g.home.split(" ").pop(),aA=g.away_abbr||g.away.split(" ").pop();
      try{
        const r=await fetch(`/api/history-soccer?home_id=${g.home_id}&away_id=${g.away_id}&matchup_avg=${avg}&league_base_rate=${leagueBaseRate}`);
        const d=await r.json();
        return{g,hA,aA,realTotal,avg,bet:d.bet||null,betA:d.betA||null};
      }catch{return null;}
    })).then(res=>{if(mountedRef.current){setRows(res.filter(Boolean));setLoading(false);}});
  },[schedule,dates,leagueBaseRate]);

  if(loading)return<div style={{padding:"3rem",textAlign:"center",color:TEXT3,fontSize:13}}>Carregando análise...</div>;
  if(!rows.length)return<div style={{padding:"3rem",textAlign:"center",color:TEXT3,fontSize:13}}>Nenhum jogo finalizado disponível.</div>;

  const pKeysB=[["precision","🎯 Precisão","edge≥15%"],["balanced","⚖️ Equilíbrio","edge≥8%"],["volume","📊 Volume","edge≥3%"]];
  const pKeysA=[["precision","🎯 Precisão","≥7pts"],["balanced","⚖️ Equilíbrio","≥5.5pts"],["volume","📊 Volume","≥4pts"]];
  const pStatsB=pKeysB.map(([key,label,thr])=>{const rec=rows.filter(r=>r.bet?.profiles?.[key]);const hits=rec.filter(r=>r.realTotal>0);return{key,label,thr,rec:rec.length,hits:hits.length,total:rows.length};});
  const pStatsA=pKeysA.map(([key,label,thr])=>{const rec=rows.filter(r=>r.betA?.profiles?.[key]);const hits=rec.filter(r=>r.realTotal>0);return{key,label,thr,rec:rec.length,hits:hits.length,total:rows.length};});

  const ProfileCards=({stats,opacity=1})=>(<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:8}}>
    {stats.map(({key,label,thr,rec,hits,total})=>{
      const p=rec>0?Math.round((hits/rec)*100):0;
      const vsBase=p-(leagueBaseRate*100);
      return(<div key={key} style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1.25rem",opacity}}>
        <div style={{fontSize:13,marginBottom:4,color:opacity<1?TEXT2:TEXT}}>{label}</div>
        <div style={{fontSize:9,color:TEXT3,marginBottom:8}}>{thr}</div>
        <div style={{fontSize:32,fontWeight:800,color:p>=55?HIT_COLOR:p>=45?YELLOW:MISS_COLOR,lineHeight:1,marginBottom:4}}>{p}%</div>
        <div style={{fontSize:11,color:TEXT2,marginBottom:4}}>{hits}/{rec} marcaram</div>
        {opacity===1&&<div style={{fontSize:10,color:vsBase>=5?HIT_COLOR:vsBase>=-5?YELLOW:MISS_COLOR,marginBottom:4}}>{vsBase>=0?"+":""}{vsBase.toFixed(1)}% vs taxa base</div>}
        <div style={{height:5,background:SURFACE2,borderRadius:3,overflow:"hidden",marginTop:4}}><div style={{width:`${p}%`,height:"100%",background:p>=55?HIT_COLOR:p>=45?YELLOW:MISS_COLOR,borderRadius:3}}/></div>
        <div style={{fontSize:10,color:TEXT3,marginTop:4}}>{rec}/{total} recomendados</div>
      </div>);
    })}
  </div>);

  return(<div style={{padding:"1.5rem 2rem",maxWidth:1100,margin:"0 auto"}}>
    <div style={{marginBottom:"1.5rem"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:4}}>Análise comparativa — Brasileirão</div>
      <div style={{fontSize:22,fontWeight:800,color:TEXT}}>Score de Aposta por Modelo</div>
      <div style={{fontSize:12,color:TEXT2,marginTop:4}}>{rows.length} jogo(s) · taxa base: <span style={{color:YELLOW,fontWeight:700}}>{(leagueBaseRate*100).toFixed(1)}%</span> · zona neutra ±0.5</div>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
      <div style={{fontSize:13,fontWeight:700,color:TEXT}}>Modelo B — Relativo à taxa base</div>
      <span style={{fontSize:10,padding:"2px 8px",borderRadius:6,background:"rgba(0,200,83,0.1)",border:"1px solid rgba(0,200,83,0.3)",color:HIT_COLOR}}>Principal</span>
    </div>
    <ProfileCards stats={pStatsB}/>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,marginTop:16}}>
      <div style={{fontSize:13,fontWeight:700,color:TEXT2}}>Modelo A — Thresholds fixos</div>
      <span style={{fontSize:10,padding:"2px 8px",borderRadius:6,background:"rgba(80,80,80,0.15)",border:`1px solid ${BORDER}`,color:TEXT3}}>Comparativo</span>
    </div>
    <ProfileCards stats={pStatsA} opacity={0.8}/>
    <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10,marginTop:16}}>Detalhe por jogo</div>
    <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 2fr",gap:0,borderBottom:`1px solid ${BORDER}`,padding:"8px 14px"}}>
        {["Jogo","Gols","EdgeB","🎯B","⚖️B","📊B","ScA","⚖️A","BreakA"].map(h=><div key={h} style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.05em"}}>{h}</div>)}
      </div>
      {rows.map(({g,hA,aA,realTotal,bet,betA},idx)=>{
        const marcou=realTotal>0;
        const ec=bet?.edge>=15?HIT_COLOR:bet?.edge>=8?YELLOW:bet?.edge>=3?TEXT2:MISS_COLOR;
        return(<div key={g.id} style={{borderBottom:idx<rows.length-1?`1px solid ${BORDER}`:"none"}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 2fr",gap:0,padding:"8px 14px",alignItems:"center"}}>
            <div><div style={{fontSize:12,fontWeight:700,color:TEXT}}>{hA} vs {aA}</div></div>
            <div><span style={{fontSize:13,fontWeight:700,color:marcou?HIT_COLOR:MISS_COLOR}}>{realTotal}</span><span style={{fontSize:10,color:TEXT3,marginLeft:3}}>{marcou?"✓":"✗"}</span></div>
            <div style={{fontSize:12,fontWeight:700,color:ec}}>{bet?.edge!=null?`${bet.edge>=0?"+":""}${bet.edge}%`:"-"}</div>
            {["precision","balanced","volume"].map(k=>{const rec=bet?.profiles?.[k];const res=rec?(marcou?"hit":"miss"):null;return(<div key={k}><RuleChip suggestion={rec?"✓":null} result={res}/></div>);})}
            <div style={{fontSize:13,fontWeight:700,color:betA?.score>=7?HIT_COLOR:betA?.score>=5.5?YELLOW:TEXT3}}>{betA?.score??"-"}</div>
            <div>{betA&&<RuleChip suggestion={betA.profiles?.balanced?"✓":null} result={betA.profiles?.balanced?(marcou?"hit":"miss"):null}/>}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
              {(betA?.breakdown||[]).filter(b=>b.pts!==0).map((b,i)=>(
                <span key={i} style={{fontSize:8,color:b.ok?HIT_COLOR:MISS_COLOR,background:b.ok?"rgba(0,200,83,0.08)":"rgba(200,16,46,0.08)",border:`1px solid ${b.ok?"rgba(0,200,83,0.2)":"rgba(200,16,46,0.2)"}`,borderRadius:4,padding:"1px 3px"}}>{b.pts>0?"+":""}{b.pts}</span>
              ))}
            </div>
          </div>
        </div>);
      })}
    </div>
    <div style={{marginTop:"1rem",fontSize:10,color:TEXT3}}>Modelo B: prob. estimada vs taxa base da liga · Modelo A: score fixo 0–10</div>
  </div>);
}

function RulesAnalysis({schedule,dates,om,sport}){
  if(sport.id==="bra")return<RulesAnalysisSoccer schedule={schedule} dates={dates} om={om} sport={sport}/>;
  return<RulesAnalysisNBA schedule={schedule} dates={dates} om={om} sport={sport}/>;
}

// ══════════════════════════════════════════════════════════════════
function App(){
  const todayStr=getBrazilToday();
  const loadDates=getLoadDates();
  const [sportId,setSportId]=useState("nba");
  const [activeTab,setActiveTab]=useState("jogos");
  const [selDate,setSelDate]=useState(todayStr);
  const [schedules,setSchedules]=useState({nba:{},bra:{}});
  const [omaps,setOmaps]=useState({nba:{},bra:{}});
  const [editing,setEditing]=useState(null);
  const [loadings,setLoadings]=useState({nba:true,bra:true});
  const [updatedAts,setUpdatedAts]=useState({nba:null,bra:null});
  const carouselRef=useRef(null);

  const sport=SPORTS[sportId];
  const schedule=schedules[sportId];
  const om=omaps[sportId];
  const loading=loadings[sportId];
  const updatedAt=updatedAts[sportId];
  const visibleDates=getVisibleDates(selDate,todayStr);
  const minSelStr=dateAdd(todayStr,-6);
  const maxSelStr=dateAdd(todayStr,7);
  const leagueBaseRate=sport.id==="bra"?calcLeagueBaseRate(schedule,loadDates):null;

  function handleSelectDate(d){if(d<minSelStr||d>maxSelStr)return;setSelDate(d);}

  async function loadSport(sid){
    setLoadings(p=>({...p,[sid]:true}));
    try{
      const start=loadDates[0].replace(/-/g,""),end=loadDates[13].replace(/-/g,"");
      const ep=sid==="bra"?"/api/games-soccer":"/api/games";
      const r=await fetch(`${ep}?bust=${Date.now()}&start=${start}&end=${end}`);
      const d=await r.json();
      if(d.schedule){
        setSchedules(p=>({...p,[sid]:d.schedule}));
        setUpdatedAts(p=>({...p,[sid]:new Date()}));
        const all=Object.values(d.schedule).flat();
        await saveOddsToKV(all,SPORTS[sid]);
        const fids=all.filter(g=>g.status==="Final"&&!g.over_under).map(g=>String(g.id));
        if(fids.length){const o=await loadOddsFromKV(fids);setOmaps(p=>({...p,[sid]:{...p[sid],...o}}));}
      }
    }catch(e){console.error(e);}
    finally{setLoadings(p=>({...p,[sid]:false}));}
  }

  useEffect(()=>{
    loadSport("nba");loadSport("bra");
    const id=setInterval(()=>{loadSport("nba");loadSport("bra");},30*60*1000);
    return()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    if(!carouselRef.current)return;
    const btn=carouselRef.current.querySelector("[data-today='true']");
    if(btn)btn.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  },[sportId,activeTab]);

  const selGames=schedule[selDate]||[];
  const finals=selGames.filter(g=>g.status==="Final").length;

  function handleSave(hs,vs){
    setSchedules(p=>({...p,[sportId]:{...p[sportId],[selDate]:p[sportId][selDate].map(g=>g.id===editing.id?{...g,hs,vs,status:"Final"}:g)}}));
    setEditing(null);
  }

  return(<div style={{background:BG,minHeight:"100vh",fontFamily:"inherit"}}>
    {editing&&<EditModal game={editing} onSave={handleSave} onClose={()=>setEditing(null)} sport={sport}/>}
    {/* Header */}
    <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`}}>
      <div style={{maxWidth:1800,margin:"0 auto",padding:"1rem 2rem 0"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{display:"flex",border:`1px solid ${BORDER}`,borderRadius:8,overflow:"hidden",flexShrink:0}}>
              {Object.values(SPORTS).map(sp=>(
                <button key={sp.id} onClick={()=>{setSportId(sp.id);setActiveTab("jogos");}} style={{padding:"7px 16px",fontSize:12,fontWeight:sportId===sp.id?700:400,background:sportId===sp.id?sp.primary:"transparent",color:sportId===sp.id?"#fff":TEXT2,border:"none",cursor:"pointer",borderRight:sp.id==="nba"?`1px solid ${BORDER}`:"none"}}>
                  {sp.icon} {sp.label}
                </button>
              ))}
            </div>
            <div>
              <div style={{fontSize:9,color:TEXT2,textTransform:"uppercase",letterSpacing:"0.15em",fontWeight:600}}>{sport.season}</div>
              <div style={{fontSize:26,fontWeight:800,color:TEXT,letterSpacing:"-0.5px"}}>Análise de Confrontos</div>
            </div>
          </div>
          <div style={{textAlign:"right",fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>
            {updatedAt?"ESPN · "+updatedAt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"carregando..."}
          </div>
        </div>
        <div style={{display:"flex"}}>
          {[["jogos","📅 Jogos"],["regras","📊 Análise de regras"]].map(([tab,label])=>(
            <button key={tab} onClick={()=>setActiveTab(tab)} style={{background:"transparent",color:activeTab===tab?TEXT:TEXT3,border:"none",borderBottom:activeTab===tab?`3px solid ${sport.secondary}`:`3px solid transparent`,padding:"8px 18px 10px",cursor:"pointer",fontSize:12,fontWeight:activeTab===tab?700:400,borderRadius:"4px 4px 0 0"}}>{label}</button>
          ))}
        </div>
      </div>
    </div>
    {/* Carrossel */}
    {activeTab==="jogos"&&(
      <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"stretch"}}>
        {visibleDates[0]>minSelStr?<button onClick={()=>handleSelectDate(dateAdd(selDate,-1))} style={{flexShrink:0,width:40,background:"transparent",border:"none",borderBottom:"3px solid transparent",borderRight:`1px solid ${BORDER}`,color:TEXT2,cursor:"pointer",fontSize:32,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>:<div style={{width:40,flexShrink:0,borderRight:`1px solid ${BORDER}`}}/>}
        <div ref={carouselRef} style={{flex:1,display:"flex"}}>
          {visibleDates.map(d=>{
            const isToday=d===todayStr,isSel=d===selDate,isPast=d<todayStr;
            const games=schedule[d]||[];
            const fin=games.filter(g=>g.status==="Final").length,tot=games.length;
            const dayName=DAYS_PT[new Date(d+"T12:00:00").getDay()];
            const dayNum=new Date(d+"T12:00:00").getDate();
            const dH=games.filter(g=>g.status==="Final"&&getGameStats(g,om,sport).result==="hit").length;
            const dO=games.filter(g=>g.status==="Final"&&!!getGameStats(g,om,sport).overUnder).length;
            return(<button key={d} data-today={isToday?"true":undefined} onClick={()=>handleSelectDate(d)} style={{flex:1,background:isSel?sport.primary:"transparent",color:isSel?"#fff":isToday?sport.primary:isPast?TEXT3:TEXT2,border:"none",borderBottom:isSel?`3px solid ${sport.secondary}`:isToday?`3px solid ${sport.primary}`:"3px solid transparent",padding:"8px 4px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderRadius:"4px 4px 0 0"}}>
              <span style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>{dayName}</span>
              <span style={{fontSize:15,fontWeight:800}}>{dayNum}</span>
              <span style={{fontSize:9,color:isSel?"rgba(255,255,255,0.6)":TEXT3}}>{tot>0?(fin>0?`${fin}/${tot}`:`${tot}j`):"—"}</span>
              {dO>0&&<span style={{fontSize:8,color:isSel?"rgba(255,255,255,0.5)":dH/dO>=0.5?"rgba(0,200,83,0.8)":"rgba(200,16,46,0.8)"}}>{dH}/{dO}</span>}
            </button>);
          })}
        </div>
        {visibleDates[visibleDates.length-1]<maxSelStr?<button onClick={()=>handleSelectDate(dateAdd(selDate,1))} style={{flexShrink:0,width:40,background:"transparent",border:"none",borderBottom:"3px solid transparent",borderLeft:`1px solid ${BORDER}`,color:TEXT2,cursor:"pointer",fontSize:32,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>:<div style={{width:40,flexShrink:0,borderLeft:`1px solid ${BORDER}`}}/>}
      </div>
    )}
    {/* Tab Jogos */}
    {activeTab==="jogos"&&(
      <div style={{display:"grid",gridTemplateColumns:"1fr 460px",gap:0,alignItems:"start",width:"100%"}}>
        <div style={{maxWidth:760,margin:"0 auto",width:"100%",padding:"1.25rem 0 1.25rem 2rem"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:"1.25rem"}}>
            {[["Jogos",selGames.length||"—"],["Finalizados",finals||"—"],[sport.id==="bra"?"Rodada":"Jogos hoje",sport.id==="bra"?(selGames[0]?.round||"—"):selGames.length||"—"]].map(([l,v])=>(
              <div key={l} style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:10,padding:"0.75rem 1rem"}}>
                <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>{l}</div>
                <div style={{fontSize:20,fontWeight:800,color:TEXT}}>{v}</div>
              </div>
            ))}
          </div>
          <AccuracyReport schedule={schedule} dates={loadDates} selDate={selDate} om={om} sport={sport}/>
          {loading&&<div style={{textAlign:"center",padding:"3rem 0",color:TEXT3,fontSize:13}}>Carregando jogos...</div>}
          {!loading&&selGames.length===0&&<div style={{textAlign:"center",padding:"3rem 0",color:TEXT3,fontSize:13}}>Nenhum jogo para este dia.</div>}
          {selGames.map(g=><CardBoundary key={g.id}><MatchupCard game={g} om={om} onEdit={setEditing} sport={sport} leagueBaseRate={leagueBaseRate}/></CardBoundary>)}
          <div style={{fontSize:9,color:TEXT3,marginTop:"1rem",textAlign:"center",letterSpacing:"0.05em"}}>{sport.id==="bra"?"Dados: ESPN API (bra.1) · Atualização a cada 30 min":"Jogos, PPG, odds e histórico: ESPN API · Atualização a cada 30 min"}</div>
        </div>
        <div style={{position:"sticky",top:0,height:"100vh",overflowY:"auto",borderLeft:`1px solid ${BORDER}`,background:SURFACE}}>
          <div style={{padding:"1.25rem"}}>
            <BettingSimulator schedule={schedule} dates={loadDates} om={om} selDate={selDate} sport={sport}/>
          </div>
        </div>
      </div>
    )}
    {/* Tab Regras */}
    {activeTab==="regras"&&<RulesAnalysis schedule={schedule} dates={loadDates} om={om} sport={sport}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
