<script type="text/babel">
const { useState, useEffect, useRef } = React;

const NBA_BLUE="#1D428A", NBA_RED="#C8102E", NBA_WHITE="#fff";
const BG="#0a0a0a", SURFACE="#111", SURFACE2="#1a1a1a", BORDER="#242424";
const TEXT="#fff", TEXT2="#A0A0A0", TEXT3="#555";
const GREEN="#00C853", HIT_COLOR="#00C853", MISS_COLOR="#C8102E";
const YELLOW="#FFD600";
const DAYS_PT=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

const PPG_FB={
  "Detroit Pistons":117.2,"Boston Celtics":115.3,"New York Knicks":118.0,
  "Cleveland Cavaliers":120.0,"Toronto Raptors":113.8,"Philadelphia 76ers":116.2,
  "Orlando Magic":115.1,"Miami Heat":119.6,"Charlotte Hornets":115.7,
  "Atlanta Hawks":117.3,"Chicago Bulls":116.8,"Milwaukee Bucks":111.8,
  "Brooklyn Nets":107.7,"Indiana Pacers":111.1,"Washington Wizards":112.2,
  "Oklahoma City Thunder":120.2,"San Antonio Spurs":118.1,"Denver Nuggets":120.4,
  "Houston Rockets":114.6,"Minnesota Timberwolves":119.7,"Los Angeles Lakers":115.9,
  "Phoenix Suns":113.6,"Golden State Warriors":115.5,"LA Clippers":111.9,
  "Portland Trail Blazers":116.0,"Memphis Grizzlies":115.3,"Dallas Mavericks":114.1,
  "Utah Jazz":118.2,"New Orleans Pelicans":114.6,"Sacramento Kings":110.1,
};

function getBrazilToday(){return new Date(Date.now()-3*60*60*1000).toISOString().split("T")[0];}
function getWeekDates(){
  const brt=new Date(Date.now()-3*60*60*1000);
  const mon=new Date(brt);
  mon.setDate(brt.getDate()-((brt.getDay()+6)%7));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split("T")[0];});
}

async function saveOddsToKV(games){
  const toSave=games.filter(g=>g.status!=="Final"&&g.over_under).map(g=>({
    id:g.id,over_under:g.over_under,spread:g.spread||null,
    proj:(g.home_ppg||PPG_FB[g.home]||0)+(g.away_ppg||PPG_FB[g.away]||0),
  }));
  if(!toSave.length)return;
  try{await fetch("/api/save-odds",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({games:toSave})});}
  catch(e){console.error("save-odds failed:",e);}
}
async function loadOddsFromKV(gameIds){
  if(!gameIds.length)return{};
  try{const r=await fetch(`/api/get-odds?ids=${gameIds.join(",")}`);const d=await r.json();return d.odds||{};}
  catch{return{};}
}

function calcResult(proj,overUnder,realTotal){
  if(!overUnder||realTotal==null)return null;
  return (proj>overUnder)===(realTotal>overUnder)?"hit":"miss";
}
function getGameStats(game,savedOddsMap){
  const hPpg=game.home_ppg||PPG_FB[game.home]||0;
  const aPpg=game.away_ppg||PPG_FB[game.away]||0;
  const saved=savedOddsMap?.[String(game.id)];
  const overUnder=game.over_under||saved?.over_under||null;
  const spread=game.spread||saved?.spread||null;
  const projDisplay=(game.status==="Final"&&saved?.proj)?saved.proj:(hPpg+aPpg);
  const avgDisplay=parseFloat((projDisplay/2).toFixed(1));
  const realTotal=(game.hs!=null&&game.vs!=null)?game.hs+game.vs:null;
  const result=game.status==="Final"?calcResult(saved?.proj||(hPpg+aPpg),overUnder,realTotal):null;
  return{hPpg,aPpg,avg:avgDisplay,proj:projDisplay,realTotal,result,overUnder,spread};
}

// ── Lógicas de sugestão ──────────────────────────────────────────
// threshold: maioria simples — above >= total/2 (empate conta como acima)
function fieldIsAbove(above,total){return total>0&&above*2>=total;}

function countFields(histData){
  if(!histData)return{above:0,below:0,total:0};
  const fields=[
    {above:histData.home.above,      total:histData.home.total},
    {above:histData.home.last5.above,total:histData.home.last5.total},
    {above:histData.away.above,      total:histData.away.total},
    {above:histData.away.last5.above,total:histData.away.last5.total},
  ];
  let above=0,below=0,valid=0;
  for(const f of fields){
    if(f.total===0)continue;
    valid++;
    if(fieldIsAbove(f.above,f.total))above++;else below++;
  }
  return{above,below,total:valid};
}

function suggestion1(proj,overUnder){
  if(!overUnder)return null;
  if(proj>overUnder)return"OVER";
  if(proj<overUnder)return"UNDER";
  return null;
}
function suggestion2(proj,overUnder,histData){
  const base=suggestion1(proj,overUnder);
  if(!base||!histData)return null;
  const{above,below,total}=countFields(histData);
  if(total<3)return null;
  if(base==="OVER"&&above>=3)return"OVER";
  if(base==="UNDER"&&below>=3)return"UNDER";
  return"NÃO APOSTE";
}
function suggestion3(histData){
  if(!histData)return null;
  const{above,below,total}=countFields(histData);
  if(total<3)return null;
  if(above>=3)return"OVER";
  if(below>=3)return"UNDER";
  return"NÃO APOSTE";
}

/**
 * Regra 4 — Campos como árbitro:
 * Se PPG e campos apontam direções OPOSTAS e campos ≥3 → seguir campos
 * Se PPG e campos apontam a MESMA direção → seguir essa direção
 * Se campos < 3 concordando → seguir PPG
 */
function suggestion4(proj, overUnder, histData){
  const base = suggestion1(proj, overUnder);
  if(!base) return null;
  if(!histData) return base; // sem histórico, usa PPG
  const{above,below,total}=countFields(histData);
  if(total<3) return base; // poucos dados, usa PPG

  const camposDir = above>=3?"OVER": below>=3?"UNDER": null;

  if(!camposDir) return base;            // campos inconclusivos → PPG
  if(camposDir===base) return base;      // mesma direção → confirma
  return camposDir;                      // direção oposta → campos vencem
}

/**
 * Regra 5 — Convergência Forte:
 * Só aposta quando PPG e campos apontam a MESMA direção
 * E a divergência PPG vs Odd é >= 5 pts (sinal mais forte).
 * Caso contrário → NÃO APOSTE
 */
function suggestion5(proj, overUnder, histData){
  const base = suggestion1(proj, overUnder);
  if(!base||!overUnder) return null;
  if(!histData) return null;
  const{above,below,total}=countFields(histData);
  if(total<3) return null;

  const div = Math.abs(proj - overUnder);
  if(div < 5) return"NÃO APOSTE"; // divergência fraca

  const camposDir = above>=3?"OVER": below>=3?"UNDER": null;
  if(!camposDir) return"NÃO APOSTE";    // campos inconclusivos
  if(camposDir !== base) return"NÃO APOSTE"; // sinais conflitantes
  return base;                           // tudo alinhado → aposta
}
function calcResultForSuggestion(suggestion,overUnder,realTotal){
  if(!suggestion||!overUnder||realTotal==null)return null;
  if(suggestion==="NÃO APOSTE")return"skip";
  const realIsOver=realTotal>overUnder;
  if(suggestion==="OVER")return realIsOver?"hit":"miss";
  if(suggestion==="UNDER")return!realIsOver?"hit":"miss";
  return null;
}

// ── Kelly ────────────────────────────────────────────────────────
function kellyFraction(p,decOdds){const b=decOdds-1,q=1-p;return(b*p-q)/b;}
function estimateProb(histAcc,divergence){
  const base=Math.min(0.75,Math.max(0.4,histAcc));
  const bonus=Math.min(0.10,(Math.abs(divergence)/5)*0.02);
  return Math.min(0.75,base+bonus);
}

// ── ScoreBar ─────────────────────────────────────────────────────
function ScoreBar({above,total}){
  const pct=total>0?(above/total)*100:0,col=pct>=50?GREEN:NBA_RED;
  return(
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <div style={{flex:1,height:4,background:SURFACE2,borderRadius:2,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:2}}/>
      </div>
      <span style={{fontSize:11,fontWeight:500,color:col,minWidth:32,textAlign:"right"}}>{above}/{total}</span>
    </div>
  );
}

// ── AccuracyReport ───────────────────────────────────────────────
function AccuracyReport({schedule,weekDates,selDate,savedOddsMap}){
  const dayGames=(schedule[selDate]||[]).filter(g=>g.status==="Final");
  const weekGames=weekDates.flatMap(d=>(schedule[d]||[]).filter(g=>g.status==="Final"));
  const countHits=games=>{
    const wo=games.filter(g=>!!getGameStats(g,savedOddsMap).overUnder);
    const h=wo.filter(g=>getGameStats(g,savedOddsMap).result==="hit");
    return{hits:h.length,total:wo.length};
  };
  const day=countHits(dayGames),week=countHits(weekGames);
  if(day.total===0&&week.total===0)return null;
  const pct=(h,t)=>t>0?Math.round((h/t)*100):0;
  return(
    <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1rem 1.25rem",marginBottom:"1.25rem",display:"flex",gap:"1.5rem",alignItems:"center"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",flexShrink:0}}>Precisão O/U</div>
      {day.total>0&&(<div style={{display:"flex",alignItems:"center",gap:12}}>
        <div>
          <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Hoje</div>
          <div style={{fontSize:18,fontWeight:800,color:pct(day.hits,day.total)>=50?HIT_COLOR:MISS_COLOR}}>{day.hits}/{day.total}</div>
          <div style={{fontSize:9,color:TEXT3}}>{pct(day.hits,day.total)}%</div>
        </div>
        <div style={{width:1,height:36,background:BORDER}}/>
      </div>)}
      {week.total>0&&(<div>
        <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Semana</div>
        <div style={{fontSize:18,fontWeight:800,color:pct(week.hits,week.total)>=50?HIT_COLOR:MISS_COLOR}}>{week.hits}/{week.total}</div>
        <div style={{fontSize:9,color:TEXT3}}>{pct(week.hits,week.total)}%</div>
      </div>)}
      {week.total>0&&(<div style={{flex:1,height:6,background:SURFACE2,borderRadius:3,overflow:"hidden",maxWidth:120}}>
        <div style={{width:`${pct(week.hits,week.total)}%`,height:"100%",background:pct(week.hits,week.total)>=50?HIT_COLOR:MISS_COLOR,borderRadius:3}}/>
      </div>)}
    </div>
  );
}

// ── OddsPanel ────────────────────────────────────────────────────
function OddsPanel({proj,overUnder,spread,result,realTotal}){
  if(!overUnder)return null;
  const diff=proj-overUnder;
  const col=Math.abs(diff)>=3?(diff>0?GREEN:NBA_RED):TEXT2;
  return(
    <div style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:10,padding:"1rem",marginTop:"1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}}>
        <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em"}}>Odds DraftKings</div>
        {result&&(<div style={{padding:"2px 10px",borderRadius:20,background:result==="hit"?"rgba(0,200,83,0.15)":"rgba(200,16,46,0.15)",border:`1px solid ${result==="hit"?"rgba(0,200,83,0.4)":"rgba(200,16,46,0.4)"}`}}>
          <span style={{fontSize:10,fontWeight:700,color:result==="hit"?HIT_COLOR:MISS_COLOR}}>
            {result==="hit"?"✓ Acerto":"✗ Erro"} · Total real: {realTotal} pts
          </span>
        </div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:"0.75rem"}}>
        {[["Linha O/U",overUnder.toFixed(1)],["Projeção PPG",proj.toFixed(1)],["Diferença",(diff>0?"+":"")+diff.toFixed(1)]].map(([l,v],i)=>(
          <div key={l} style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:TEXT3,marginBottom:3}}>{l}</div>
            <div style={{fontSize:16,fontWeight:700,color:i===2?col:TEXT}}>{v}</div>
          </div>
        ))}
      </div>
      {!result&&(
        <div style={{display:"flex",justifyContent:"center",gap:8}}>
          <div style={{padding:"3px 12px",borderRadius:20,background:diff>0?"rgba(0,200,83,0.12)":"rgba(200,16,46,0.12)",border:`1px solid ${diff>0?"rgba(0,200,83,0.3)":"rgba(200,16,46,0.3)"}`}}>
            <span style={{fontSize:11,fontWeight:700,color:diff>0?GREEN:NBA_RED}}>PPG sugere {diff>0?"OVER":"UNDER"} {overUnder.toFixed(1)}</span>
          </div>
          {spread&&<div style={{padding:"3px 12px",borderRadius:20,background:SURFACE,border:`1px solid ${BORDER}`}}>
            <span style={{fontSize:11,color:TEXT2}}>Spread: {spread}</span>
          </div>}
        </div>
      )}
    </div>
  );
}

// ── HistoryPanel ─────────────────────────────────────────────────
function HistoryPanel({homeId,awayId,matchupAvg,homeAbbr,awayAbbr,onHistoryLoaded}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  useEffect(()=>{
    if(!homeId||!awayId)return;
    setLoading(true);
    fetch(`/api/history?home_id=${homeId}&away_id=${awayId}&matchup_avg=${matchupAvg}`)
      .then(r=>r.json()).then(d=>{setData(d);setLoading(false);if(onHistoryLoaded)onHistoryLoaded(d);})
      .catch(()=>setLoading(false));
  },[homeId,awayId,matchupAvg]);
  return(
    <div style={{borderTop:`1px solid ${BORDER}`,paddingTop:"1.25rem",marginTop:"1rem"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"1rem"}}>
        jogos acima da média do confronto — {matchupAvg.toFixed(1)} pts
      </div>
      {loading&&<div style={{fontSize:11,color:TEXT3}}>Carregando histórico...</div>}
      {!loading&&!data&&<div style={{fontSize:11,color:TEXT3}}>Histórico indisponível</div>}
      {data&&[
        {label:`Temporada (${data.home.total}j)`,hA:data.home.above,aA:data.away.above,hn:data.home.total,an:data.away.total},
        {label:"Últimos 5 jogos",hA:data.home.last5.above,aA:data.away.last5.above,hn:data.home.last5.total,an:data.away.last5.total},
      ].map(({label,hA,aA,hn,an})=>(
        <div key={label} style={{marginBottom:"0.85rem"}}>
          <div style={{fontSize:10,color:TEXT2,marginBottom:6,fontWeight:500}}>{label}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 36px 1fr",gap:8,alignItems:"center"}}>
            <div><div style={{fontSize:11,color:TEXT3,marginBottom:4}}>{homeAbbr}</div><ScoreBar above={hA} total={hn}/></div>
            <div style={{textAlign:"center",fontSize:9,color:TEXT3}}>vs</div>
            <div><div style={{fontSize:11,color:TEXT3,marginBottom:4}}>{awayAbbr}</div><ScoreBar above={aA} total={an}/></div>
          </div>
        </div>
      ))}
      {data&&<div style={{fontSize:9,color:TEXT3,marginTop:4}}>Dados reais da temporada ESPN</div>}
    </div>
  );
}

// ── EditModal ────────────────────────────────────────────────────
function EditModal({game,onSave,onClose}){
  const [hs,setHs]=useState(game.hs??"");
  const [vs,setVs]=useState(game.vs??"");
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1.5rem",width:300}}>
        <div style={{height:3,background:`linear-gradient(90deg,${NBA_BLUE},${NBA_RED})`,borderRadius:2,marginBottom:"1.25rem"}}/>
        <div style={{fontSize:11,color:TEXT2,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"1.25rem",textAlign:"center"}}>Inserir placar final</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 24px 1fr",alignItems:"center",gap:8,marginBottom:"1.5rem"}}>
          {[["home",game.home_abbr||game.home.split(" ").pop(),hs,setHs],["away",game.away_abbr||game.away.split(" ").pop(),vs,setVs]].map(([side,label,val,set])=>(
            <div key={side} style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:TEXT2,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
              <input type="number" value={val} onChange={e=>set(e.target.value)}
                style={{width:"100%",background:SURFACE2,color:TEXT,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px 8px",fontSize:22,fontWeight:700,textAlign:"center"}}/>
            </div>
          ))}
          <div style={{textAlign:"center",color:TEXT3,fontSize:14,paddingTop:20}}>×</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,background:"transparent",color:TEXT2,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px",fontSize:13,cursor:"pointer"}}>Cancelar</button>
          <button onClick={()=>{if(hs!==""&&vs!=="")onSave(Number(hs),Number(vs));}} disabled={hs===""||vs===""}
            style={{flex:1,background:NBA_BLUE,color:NBA_WHITE,border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:600,cursor:hs===""||vs===""?"not-allowed":"pointer",opacity:hs===""||vs===""?0.4:1}}>
            Confirmar
          </button>
        </div>
      </div>
    </div>
  );
}

// ── MatchupCard ──────────────────────────────────────────────────
function MatchupCard({game,savedOddsMap,onEdit}){
  const {hPpg,aPpg,avg,proj,realTotal,result,overUnder,spread}=getGameStats(game,savedOddsMap);
  if(!hPpg||!aPpg)return null;
  const isFinal=game.status==="Final";
  const isLive=!isFinal&&game.status!=="Agendado";
  const hWin=isFinal&&game.hs>game.vs;
  const aWin=isFinal&&game.vs>game.hs;
  const hAbbr=game.home_abbr||game.home.split(" ").pop();
  const aAbbr=game.away_abbr||game.away.split(" ").pop();
  const accentColor=isFinal&&result==="hit"?HIT_COLOR:isFinal&&result==="miss"?MISS_COLOR:isLive?GREEN:null;
  const cardBorder=accentColor?`1px solid ${accentColor}33`:`1px solid ${BORDER}`;
  return(
    <div style={{background:SURFACE,border:cardBorder,borderRadius:12,overflow:"hidden",marginBottom:"1rem"}}>
      <div style={{height:3,background:isFinal&&result==="hit"?HIT_COLOR:isFinal&&result==="miss"?MISS_COLOR:isLive?GREEN:SURFACE2}}/>
      <div style={{padding:"1.25rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {isLive&&<span style={{width:7,height:7,borderRadius:"50%",background:GREEN,display:"inline-block"}}/>}
            <span style={{fontSize:10,fontWeight:600,color:isFinal&&result==="hit"?HIT_COLOR:isFinal&&result==="miss"?MISS_COLOR:isLive?GREEN:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em"}}>{game.status}</span>
          </div>
          <button onClick={()=>onEdit(game)} style={{background:"transparent",color:isFinal?TEXT3:NBA_BLUE,border:`1px solid ${isFinal?BORDER:NBA_BLUE}`,borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:500,cursor:"pointer"}}>
            {isFinal?"✎ editar":"+ placar"}
          </button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:8,marginBottom:"1.25rem"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:800,color:hWin?NBA_WHITE:isFinal?TEXT2:TEXT,letterSpacing:"-0.5px",lineHeight:1}}>{hAbbr}</div>
            <div style={{fontSize:10,color:TEXT2,marginTop:4}}>{game.home}</div>
            <div style={{fontSize:12,color:TEXT3,marginTop:2}}>{hPpg.toFixed(1)} PPG</div>
            {game.home_record&&<div style={{fontSize:10,color:TEXT3}}>{game.home_record}</div>}
            {(isFinal||isLive)&&<div style={{fontSize:30,fontWeight:800,color:hWin?NBA_WHITE:TEXT2,marginTop:8,lineHeight:1}}>{game.hs}</div>}
          </div>
          <div style={{textAlign:"center",padding:"0 4px"}}>
            <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>média</div>
            <div style={{fontSize:32,fontWeight:800,color:NBA_BLUE,lineHeight:1}}>{avg.toFixed(1)}</div>
            <div style={{fontSize:9,color:TEXT3,marginTop:6}}>pts/time</div>
            <div style={{marginTop:8,padding:"4px 10px",background:SURFACE2,borderRadius:6,border:`1px solid ${BORDER}`}}>
              <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>total proj.</div>
              <div style={{fontSize:14,fontWeight:700,color:TEXT}}>{Math.round(proj)}</div>
            </div>
            {isFinal&&realTotal!=null&&(
              <div style={{marginTop:6,padding:"4px 10px",background:result==="hit"?"rgba(0,200,83,0.1)":"rgba(200,16,46,0.1)",borderRadius:6,border:`1px solid ${result==="hit"?"rgba(0,200,83,0.3)":"rgba(200,16,46,0.3)"}`}}>
                <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>total real</div>
                <div style={{fontSize:14,fontWeight:700,color:result==="hit"?HIT_COLOR:MISS_COLOR}}>{realTotal}</div>
              </div>
            )}
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:800,color:aWin?NBA_WHITE:isFinal?TEXT2:TEXT,letterSpacing:"-0.5px",lineHeight:1}}>{aAbbr}</div>
            <div style={{fontSize:10,color:TEXT2,marginTop:4}}>{game.away}</div>
            <div style={{fontSize:12,color:TEXT3,marginTop:2}}>{aPpg.toFixed(1)} PPG</div>
            {game.away_record&&<div style={{fontSize:10,color:TEXT3}}>{game.away_record}</div>}
            {(isFinal||isLive)&&<div style={{fontSize:30,fontWeight:800,color:aWin?NBA_WHITE:TEXT2,marginTop:8,lineHeight:1}}>{game.vs}</div>}
          </div>
        </div>
        <OddsPanel proj={proj} overUnder={overUnder} spread={spread} result={result} realTotal={realTotal}/>

          <HistoryPanel homeId={game.home_id} awayId={game.away_id} matchupAvg={avg} homeAbbr={hAbbr} awayAbbr={aAbbr}/>
        )}
      </div>
    </div>
  );
}

// ── Simulador ────────────────────────────────────────────────────
function BettingSimulator({schedule,weekDates,savedOddsMap,selDate}){
  const [banca,setBanca]=useState(1000);
  const [minDiv,setMinDiv]=useState(5);
  const [kFrac,setKFrac]=useState(0.5);
  const [maxPct,setMaxPct]=useState(5);
  const weekGames=weekDates.flatMap(d=>(schedule[d]||[]).filter(g=>g.status==="Final"));
  const withOdds=weekGames.filter(g=>!!getGameStats(g,savedOddsMap).overUnder);
  const hits=withOdds.filter(g=>getGameStats(g,savedOddsMap).result==="hit");
  const histAcc=withOdds.length>0?hits.length/withOdds.length:0.55;
  const todayGames=(schedule[selDate]||[]).filter(g=>{if(g.status==="Final")return false;return!!getGameStats(g,savedOddsMap).overUnder;});
  const allocations=todayGames.map(g=>{
    const{proj,overUnder}=getGameStats(g,savedOddsMap);
    const div=proj-overUnder;const absDiv=Math.abs(div);
    if(absDiv<minDiv)return{game:g,reason:"divergência insuficiente",alloc:0};
    const p=estimateProb(histAcc,div);const odds=1.91;const kf=kellyFraction(p,odds);
    if(kf<=0)return{game:g,reason:"edge negativo",alloc:0};
    const rawPct=kf*kFrac*100;const cappedPct=Math.min(maxPct,rawPct);
    const alloc=parseFloat(((cappedPct/100)*banca).toFixed(2));
    const side=div>0?"OVER":"UNDER";const retorno=parseFloat((alloc*(odds-1)).toFixed(2));
    return{game:g,div,absDiv,p,kf,rawPct,cappedPct,alloc,side,retorno,overUnder,reason:null};
  });
  const eligible=allocations.filter(a=>a.alloc>0);
  const excluded=allocations.filter(a=>a.alloc===0);
  const totalAlloc=eligible.reduce((s,a)=>s+a.alloc,0);
  const totalRet=eligible.reduce((s,a)=>s+a.retorno,0);
  const pctBanca=parseFloat(((totalAlloc/banca)*100).toFixed(1));
  return(
    <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1.25rem",marginBottom:"1.25rem"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"1rem"}}>Simulador de alocação — Kelly</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:"1.25rem"}}>
        {[["Banca (R$)",banca,setBanca,50,100000,50],["Divergência mínima (pts)",minDiv,setMinDiv,1,20,1],["Nível de risco",kFrac,setKFrac,0.1,1,0.05],["Teto por jogo (%)",maxPct,setMaxPct,1,20,1]].map(([label,val,setter,min,max,step])=>(
          <div key={label}>
            <div style={{fontSize:9,color:TEXT3,marginBottom:4}}>{label}</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <input type="range" min={min} max={max} step={step} value={val} onChange={e=>setter(Number(e.target.value))} style={{flex:1}}/>
              <span style={{fontSize:13,fontWeight:700,color:TEXT,minWidth:40,textAlign:"right"}}>{val}</span>
            </div>
          </div>
        ))}
      </div>
      <div style={{background:SURFACE2,borderRadius:8,padding:"8px 12px",marginBottom:"1rem",display:"flex",alignItems:"center",gap:12}}>
        <div>
          <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Acurácia histórica (semana)</div>
          <div style={{fontSize:16,fontWeight:800,color:histAcc>=0.5?HIT_COLOR:MISS_COLOR}}>{hits.length}/{withOdds.length} — {Math.round(histAcc*100)}%</div>
        </div>
        <div style={{width:1,height:32,background:BORDER}}/>
        <div style={{fontSize:10,color:TEXT3,lineHeight:1.5}}>Probabilidade base usada no Kelly.<br/>Atualiza conforme mais jogos finalizam.</div>
      </div>
      {todayGames.length===0&&<div style={{textAlign:"center",padding:"1.5rem 0",color:TEXT3,fontSize:12}}>Nenhum jogo agendado com odds disponíveis.</div>}
      {eligible.length>0&&(<>
        <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Jogos selecionados ({eligible.length})</div>
        {eligible.map(a=>{
          const hA=a.game.home_abbr||a.game.home.split(" ").pop();
          const aA=a.game.away_abbr||a.game.away.split(" ").pop();
          return(<div key={a.game.id} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700,color:TEXT,marginBottom:5}}>{hA} vs {aA}</div>
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  <div style={{fontSize:11,color:TEXT2}}>Apostar: <span style={{color:a.side==="OVER"?HIT_COLOR:NBA_BLUE,fontWeight:700}}>{a.side} {a.overUnder}</span></div>
                  <div style={{fontSize:11,color:TEXT2}}>Divergência: <span style={{color:TEXT}}>{a.div>0?"+":""}{a.div.toFixed(1)} pts</span></div>
                  <div style={{fontSize:11,color:TEXT2}}>P(acerto): <span style={{color:TEXT}}>{Math.round(a.p*100)}%</span></div>
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                <div style={{fontSize:18,fontWeight:800,color:HIT_COLOR}}>R$ {a.alloc.toFixed(2)}</div>
                <div style={{fontSize:10,color:TEXT3,marginTop:2}}>{a.cappedPct.toFixed(1)}% da banca</div>
                <div style={{fontSize:10,color:TEXT3}}>retorno: R$ {a.retorno.toFixed(2)}</div>
              </div>
            </div>
          </div>);
        })}
        <div style={{background:SURFACE2,borderRadius:10,padding:"10px 12px",border:`1px solid ${BORDER}`,marginTop:4}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {[["Total alocado",`R$ ${totalAlloc.toFixed(2)}`],["% da banca",`${pctBanca}%`],["Retorno potencial",`R$ ${totalRet.toFixed(2)}`]].map(([l,v])=>(
              <div key={l} style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>{l}</div>
                <div style={{fontSize:14,fontWeight:700,color:TEXT}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </>)}
      {excluded.length>0&&(<div style={{marginTop:"1rem"}}>
        <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Excluídos ({excluded.length})</div>
        {excluded.map(a=>{
          const hA=a.game.home_abbr||a.game.home.split(" ").pop();
          const aA=a.game.away_abbr||a.game.away.split(" ").pop();
          return(<div key={a.game.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",borderRadius:8,background:SURFACE2,marginBottom:4,opacity:0.5}}>
            <span style={{fontSize:11,color:TEXT2}}>{hA} vs {aA}</span>
            <span style={{fontSize:10,color:TEXT3}}>{a.reason}</span>
          </div>);
        })}
      </div>)}
      <div style={{fontSize:9,color:TEXT3,marginTop:"1rem",lineHeight:1.6}}>Odds padrão O/U: -110 (1.91x) · Modelo para fins analíticos</div>
    </div>
  );
}

// Busca e cacheia histData por game id
const histCache = {};
async function fetchHist(homeId, awayId, avg) {
  const key = `${homeId}_${awayId}_${avg}`;
  if (histCache[key]) return histCache[key];
  try {
    const r = await fetch(`/api/history?home_id=${homeId}&away_id=${awayId}&matchup_avg=${avg}`);
    const d = await r.json();
    histCache[key] = d;
    return d;
  } catch { return null; }
}

function RuleChip({suggestion, result}){
  const isSkip = !suggestion || suggestion === "NÃO APOSTE";
  const col = isSkip ? TEXT3 : suggestion === "OVER" ? GREEN : "#6fa3ff";
  const bg  = isSkip ? "rgba(80,80,80,0.15)" : suggestion === "OVER" ? "rgba(0,200,83,0.12)" : "rgba(29,66,138,0.2)";
  const bd  = isSkip ? "rgba(80,80,80,0.3)"  : suggestion === "OVER" ? "rgba(0,200,83,0.3)"  : "rgba(29,66,138,0.5)";
  let icon = "";
  if(result === "hit")  icon = " ✓";
  if(result === "miss") icon = " ✗";
  if(result === "skip") icon = " —";
  const iconCol = result === "hit" ? HIT_COLOR : result === "miss" ? MISS_COLOR : TEXT3;
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:2,padding:"2px 8px",borderRadius:6,background:bg,border:`1px solid ${bd}`,fontSize:11,fontWeight:700,color:col}}>
      {isSkip ? "N/A" : suggestion}
      {icon && <span style={{color:iconCol,fontSize:11}}>{icon}</span>}
    </span>
  );
}

function RulesAnalysis({schedule, weekDates, savedOddsMap}){
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const mountedRef = useRef(true);

  useEffect(()=>{
    mountedRef.current = true;
    return () => { mountedRef.current = false; };
  }, []);

  useEffect(()=>{
    const finalGames = weekDates
      .flatMap(d => (schedule[d]||[]))
      .filter(g => g.status === "Final");

    if(!finalGames.length){ setLoading(false); return; }
    setLoading(true);

    const eligible = finalGames.filter(g => {
      const {overUnder, realTotal} = getGameStats(g, savedOddsMap);
      return !!overUnder && realTotal != null;
    });

    if(!eligible.length){ setLoading(false); return; }

    Promise.all(eligible.map(async g => {
      const {hPpg,aPpg,avg,proj,overUnder,realTotal} = getGameStats(g, savedOddsMap);
      const histData = g.home_id && g.away_id ? await fetchHist(g.home_id, g.away_id, avg) : null;

      const sug1 = suggestion1(proj, overUnder);
      const sug2 = suggestion2(proj, overUnder, histData);
      const sug3 = suggestion3(histData);
      const sug4 = suggestion4(proj, overUnder, histData);
      const sug5 = suggestion5(proj, overUnder, histData);

      const res1 = calcResultForSuggestion(sug1, overUnder, realTotal);
      const res2 = calcResultForSuggestion(sug2, overUnder, realTotal);
      const res3 = calcResultForSuggestion(sug3, overUnder, realTotal);
      const res4 = calcResultForSuggestion(sug4, overUnder, realTotal);
      const res5 = calcResultForSuggestion(sug5, overUnder, realTotal);

      const hAbbr = g.home_abbr || g.home.split(" ").pop();
      const aAbbr = g.away_abbr || g.away.split(" ").pop();

      // campos individuais para exibição
      const fields = histData ? [
        {label:`${hAbbr} temp.`, above: histData.home.above,       total: histData.home.total},
        {label:`${hAbbr} ult5`, above: histData.home.last5.above, total: histData.home.last5.total},
        {label:`${aAbbr} temp.`, above: histData.away.above,       total: histData.away.total},
        {label:`${aAbbr} ult5`, above: histData.away.last5.above, total: histData.away.last5.total},
      ] : null;

      return { g, hAbbr, aAbbr, proj, overUnder, realTotal, sug1,sug2,sug3,sug4,sug5, res1,res2,res3,res4,res5, histData, fields };
    })).then(results => {
      if(mountedRef.current){
        setRows(results);
        setLoading(false);
      }
    });
  }, [schedule, weekDates, savedOddsMap]);

  // Totalizadores
  const count = (res) => rows.filter(r => res(r) === "hit").length;
  const total = (res) => rows.filter(r => res(r) === "hit" || res(r) === "miss").length;
  const skipped = (res) => rows.filter(r => res(r) === "skip").length;
  const pct = (h,t) => t>0 ? Math.round((h/t)*100) : 0;

  const h1=count(r=>r.res1), t1=total(r=>r.res1);
  const h2=count(r=>r.res2), t2=total(r=>r.res2), s2=skipped(r=>r.res2);
  const h3=count(r=>r.res3), t3=total(r=>r.res3), s3=skipped(r=>r.res3);
  const h4=count(r=>r.res4), t4=total(r=>r.res4), s4=skipped(r=>r.res4);
  const h5=count(r=>r.res5), t5=total(r=>r.res5), s5=skipped(r=>r.res5);

  const best = [
    {i:1, pct: pct(h1,t1)},
    {i:2, pct: pct(h2,t2)},
    {i:3, pct: pct(h3,t3)},
    {i:4, pct: pct(h4,t4)},
    {i:5, pct: pct(h5,t5)},
  ].sort((a,b)=>b.pct-a.pct)[0]?.i;

  const RULE_LABELS = [
    "Regra 1 — PPG vs Odd",
    "Regra 2 — PPG + Campos",
    "Regra 3 — Só Campos",
    "Regra 4 — Campos árbitro",
    "Regra 5 — Convergência forte",
  ];
  const RULE_DESC = [
    "Proj PPG > Odd → OVER | Proj PPG < Odd → UNDER",
    "Mesma direção do PPG, validada por ≥3/4 campos",
    "≥3 campos acima → OVER | ≥3 abaixo → UNDER | senão N/A",
    "Campos conflitam com PPG e ≥3 → seguir campos; senão PPG",
    "PPG + campos mesma direção E divergência ≥5pts; senão N/A",
  ];

  if(loading){
    return(
      <div style={{padding:"3rem 2rem",textAlign:"center",color:TEXT3,fontSize:13}}>
        Carregando análise histórica de todos os jogos finalizados...
      </div>
    );
  }
  if(!rows.length){
    return(
      <div style={{padding:"3rem 2rem",textAlign:"center",color:TEXT3,fontSize:13}}>
        Nenhum jogo finalizado com odds disponíveis esta semana.
      </div>
    );
  }

  return(
    <div style={{padding:"1.5rem 2rem",maxWidth:900,margin:"0 auto"}}>
      {/* Título */}
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:4}}>Análise comparativa — semana atual</div>
        <div style={{fontSize:22,fontWeight:800,color:TEXT,letterSpacing:"-0.3px"}}>Taxa de Acerto por Regra</div>
        <div style={{fontSize:12,color:TEXT2,marginTop:4}}>{rows.length} jogo(s) finalizado(s) com odds · threshold: maioria simples</div>
      </div>

      {/* Cards de resumo */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:"2rem"}}>
        {[[h1,t1,0,0],[h2,t2,s2,1],[h3,t3,s3,2],[h4,t4,s4,3],[h5,t5,s5,4]].map(([h,t,sk,i])=>{
          const p=pct(h,t);
          const isBest = (i+1)===best;
          const colBorder = isBest ? YELLOW : BORDER;
          return(
            <div key={i} style={{background:SURFACE,border:`2px solid ${colBorder}`,borderRadius:12,padding:"1.25rem",position:"relative",overflow:"hidden"}}>
              {isBest&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:YELLOW}}/>}
              {isBest&&<div style={{position:"absolute",top:8,right:10,fontSize:9,color:YELLOW,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>✦ Melhor</div>}
              <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>{RULE_LABELS[i]}</div>
              <div style={{fontSize:36,fontWeight:800,color:p>=50?HIT_COLOR:MISS_COLOR,lineHeight:1,marginBottom:4}}>{p}%</div>
              <div style={{fontSize:13,color:TEXT2,marginBottom:8}}>{h}/{t} acertos</div>
              {sk>0&&<div style={{fontSize:10,color:TEXT3,marginBottom:8}}>{sk} jogo(s) N/A</div>}
              {/* barra de progresso */}
              <div style={{height:5,background:SURFACE2,borderRadius:3,overflow:"hidden",marginBottom:8}}>
                <div style={{width:`${p}%`,height:"100%",background:p>=50?HIT_COLOR:MISS_COLOR,borderRadius:3}}/>
              </div>
              <div style={{fontSize:9,color:TEXT3,lineHeight:1.5}}>{RULE_DESC[i]}</div>
            </div>
          );
        })}
      </div>

      {/* Tabela jogo a jogo */}
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Detalhe por jogo</div>
      <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,overflow:"hidden"}}>
        {/* cabeçalho */}
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 4fr",gap:0,borderBottom:`1px solid ${BORDER}`,padding:"8px 14px"}}>
          {["Jogo","Total real","O/U","R1","R2","R3","R4","R5 + campos"].map(h=>(
            <div key={h} style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>{h}</div>
          ))}
        </div>
        {rows.map(({g,hAbbr,aAbbr,overUnder,realTotal,sug1,sug2,sug3,sug4,sug5,res1,res2,res3,res4,res5,fields},idx)=>(
          <div key={g.id} style={{borderBottom:idx<rows.length-1?`1px solid ${BORDER}`:"none"}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 4fr",gap:0,padding:"10px 14px",alignItems:"center"}}>
              {/* Jogo */}
              <div>
                <div style={{fontSize:13,fontWeight:700,color:TEXT}}>{hAbbr} vs {aAbbr}</div>
                <div style={{fontSize:10,color:TEXT3}}>{g.home.split(" ").slice(-1)[0]} vs {g.away.split(" ").slice(-1)[0]}</div>
              </div>
              <div style={{fontSize:14,fontWeight:700,color:TEXT}}>{realTotal}</div>
              <div style={{fontSize:13,color:TEXT2}}>{overUnder?.toFixed(1)}</div>
              <div><RuleChip suggestion={sug1} result={res1}/></div>
              <div><RuleChip suggestion={sug2} result={res2}/></div>
              <div><RuleChip suggestion={sug3} result={res3}/></div>
              <div><RuleChip suggestion={sug4} result={res4}/></div>
              {/* R5 + campos */}
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <RuleChip suggestion={sug5} result={res5}/>
                {fields&&(
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:2}}>
                    {fields.map(f=>{
                      const isAbove=fieldIsAbove(f.above,f.total);
                      return(
                        <span key={f.label} style={{fontSize:9,color:isAbove?GREEN:MISS_COLOR,background:isAbove?"rgba(0,200,83,0.08)":"rgba(200,16,46,0.08)",border:`1px solid ${isAbove?"rgba(0,200,83,0.2)":"rgba(200,16,46,0.2)"}`,borderRadius:4,padding:"1px 5px"}}>
                          {f.label} {f.above}/{f.total}
                        </span>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Legenda */}
      <div style={{marginTop:"1.25rem",display:"flex",gap:16,flexWrap:"wrap"}}>
        {[["✓ hit","acertou",HIT_COLOR],["✗ miss","errou",MISS_COLOR],["— N/A","não apostar / sem dados",TEXT3]].map(([icon,desc,col])=>(
          <div key={icon} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:TEXT3}}>

          </div>
        ))}
        <div style={{fontSize:10,color:TEXT3}}>· Campos: maioria simples = above &gt; total/2</div>
      </div>
    </div>
  );

      <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`}}>
        <div style={{maxWidth:1800,margin:"0 auto",padding:"1rem 2rem 0"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{display:"flex",borderRadius:4,overflow:"hidden"}}>
                <div style={{width:8,height:28,background:NBA_BLUE}}/><div style={{width:8,height:28,background:NBA_RED}}/>
              </div>
              <div>
                <div style={{fontSize:9,color:TEXT2,textTransform:"uppercase",letterSpacing:"0.15em",fontWeight:600}}>NBA · 2025-26</div>
                <div style={{fontSize:28,fontWeight:800,color:TEXT,letterSpacing:"-0.5px"}}>Análise de Confrontos</div>
              </div>
            </div>
            <div style={{textAlign:"right",fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>
              {updatedAt?"ESPN · "+updatedAt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"carregando..."}
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:"flex",gap:0,marginBottom:0}}>
            {[["jogos","📅 Jogos da semana"],["regras","📊 Análise de regras"]].map(([tab,label])=>(
              <button key={tab} onClick={()=>setActiveTab(tab)} style={{
                background:"transparent",color:activeTab===tab?NBA_WHITE:TEXT3,
                border:"none",borderBottom:activeTab===tab?`3px solid ${NBA_RED}`:`3px solid transparent`,
                padding:"8px 18px 10px",cursor:"pointer",fontSize:12,fontWeight:activeTab===tab?700:400,
                letterSpacing:"0.03em",borderRadius:"4px 4px 0 0",
              }}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Tab: Jogos */}
      {activeTab==="jogos"&&(<>
        {/* Seletor de dia */}
        <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`}}>
          <div style={{maxWidth:1800,margin:"0 auto",padding:"0 2rem"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
              {weekDates.map(d=>{
                const isToday=d===todayStr,isSel=d===selDate;
                const games=schedule[d]||[];
                const fin=games.filter(g=>g.status==="Final").length,tot=games.length;
                const dayName=DAYS_PT[new Date(d+"T12:00:00").getDay()];
                const dayNum=new Date(d+"T12:00:00").getDate();
                const dayHits=games.filter(g=>g.status==="Final"&&getGameStats(g,savedOddsMap).result==="hit").length;
                const dayWithOdds=games.filter(g=>g.status==="Final"&&!!getGameStats(g,savedOddsMap).overUnder).length;
                return(
                  <button key={d} onClick={()=>setSelDate(d)} style={{background:isSel?NBA_BLUE:"transparent",color:isSel?NBA_WHITE:isToday?NBA_BLUE:TEXT2,border:"none",borderBottom:isSel?`3px solid ${NBA_RED}`:isToday?`3px solid ${NBA_BLUE}`:"3px solid transparent",padding:"8px 4px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderRadius:"4px 4px 0 0"}}>
                    <span style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>{dayName}</span>
                    <span style={{fontSize:15,fontWeight:800}}>{dayNum}</span>
                    <span style={{fontSize:9,color:isSel?"rgba(255,255,255,0.6)":TEXT3}}>{tot>0?(fin>0?`${fin}/${tot}`:`${tot}j`):"—"}</span>
                    {dayWithOdds>0&&<span style={{fontSize:8,color:isSel?"rgba(255,255,255,0.5)":dayHits/dayWithOdds>=0.5?"rgba(0,200,83,0.8)":"rgba(200,16,46,0.8)"}}>{dayHits}/{dayWithOdds}</span>}
                  </button>
                );
              })}
            </div>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 460px",gap:0,alignItems:"start",width:"100%"}}>
          <div style={{maxWidth:760,margin:"0 auto",width:"100%",padding:"1.25rem 0 1.25rem 2rem"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:"1.25rem"}}>
              {[["Jogos",selGames.length||"—"],["Finalizados",finals||"—"],["Maior total proj.",maxProj?`${Math.round(maxProj)} pts`:"—"]].map(([l,v])=>(
                <div key={l} style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:10,padding:"0.75rem 1rem"}}>
                  <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>{l}</div>
                  <div style={{fontSize:20,fontWeight:800,color:TEXT}}>{v}</div>
                </div>
              ))}
            </div>
            <AccuracyReport schedule={schedule} weekDates={weekDates} selDate={selDate} savedOddsMap={savedOddsMap}/>
            {loading&&<div style={{textAlign:"center",padding:"3rem 0",color:TEXT3,fontSize:13}}>Carregando jogos...</div>}
            {!loading&&selGames.length===0&&<div style={{textAlign:"center",padding:"3rem 0",color:TEXT3,fontSize:13}}>Nenhum jogo para este dia.</div>}
            {selGames.map(g=><MatchupCard key={g.id} game={g} savedOddsMap={savedOddsMap} onEdit={setEditing}/>)}
            <div style={{fontSize:9,color:TEXT3,marginTop:"1rem",textAlign:"center",letterSpacing:"0.05em"}}>
              Jogos, PPG, odds e histórico: ESPN API · Atualização automática a cada 30 min
            </div>
          </div>
          <div style={{position:"sticky",top:0,height:"100vh",overflowY:"auto",borderLeft:`1px solid ${BORDER}`,background:SURFACE}}>
            <div style={{padding:"1.25rem"}}>
              <BettingSimulator schedule={schedule} weekDates={weekDates} savedOddsMap={savedOddsMap} selDate={selDate}/>
            </div>
          </div>
        </div>
      </>)}

      {/* Tab: Análise de Regras */}
      {activeTab==="regras"&&(
        <RulesAnalysis schedule={schedule} weekDates={weekDates} savedOddsMap={savedOddsMap}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
