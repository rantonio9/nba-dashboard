// ── Helpers ───────────────────────────────────────────────────────
function getBrazilToday(){return new Date(Date.now()-3*60*60*1000).toISOString().split("T")[0];}
function getLast7Dates(){
  const brt=new Date(Date.now()-3*60*60*1000);
  return Array.from({length:7},(_,i)=>{
    const d=new Date(brt); d.setDate(brt.getDate()-(6-i));
    return d.toISOString().split("T")[0];
  });
}

function getStatFallback(sport, teamName){
  if(sport.id==="nba") return PPG_FB[teamName]||0;
  return GPJ_FB[teamName]||1.3;
}

async function saveOddsToKV(games, sport){
  const isBra = sport?.id === "bra";
  const toSave = games.filter(g => g.status !== "Final" && g.over_under).map(g => ({
    id: g.id,
    over_under: g.over_under,
    spread: g.spread || null,
    // Futebol: proj = (ataque mandante + defesa visitante) / 2
    // NBA:     proj = ataque mandante + ataque visitante
    proj: isBra
      ? parseFloat(((g.home_ppg || 0) + (g.away_ppg || 0)) / 2)
      : (g.home_ppg || 0) + (g.away_ppg || 0),
    home_ppg: g.home_ppg || null,  // sempre ataque mandante
    away_ppg: g.away_ppg || null,  // NBA: ataque visitante | Futebol: gols sofridos visitante
  }));
  if (!toSave.length) return;
  try {
    await fetch("/api/save-odds", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ games: toSave }),
    });
  } catch(e) { console.error("save-odds failed:", e); }
}
async function loadOddsFromKV(gameIds){
  if(!gameIds.length)return{};
  try{const r=await fetch(`/api/get-odds?ids=${gameIds.join(",")}`);const d=await r.json();return d.odds||{};}
  catch{return{};}
}

// ── fieldIsAbove: maioria simples (above >= total/2) ──────────────
function fieldIsAbove(above,total){return total>0&&above*2>=total;}

// ── Brasileirão: classifica jogo pelo total com zona neutra ──────
// Retorna "over"|"under"|"neutral"
function braGameClass(totalGols, matchupAvg, zone=0.5){
  if(totalGols>matchupAvg+zone) return "over";
  if(totalGols<matchupAvg-zone) return "under";
  return "neutral";
}

// ── getGameStats — adaptado por sport ────────────────────────────
function getGameStats(game, savedOddsMap, sport){
  const isBra = sport.id === "bra";
  const fb  = getStatFallback(sport, game.home);
  const fbA = getStatFallback(sport, game.away);
  const saved = savedOddsMap?.[String(game.id)];
  const isFinal = game.status === "Final";

  // home_ppg: sempre ataque do mandante
  const hPpg = saved?.home_ppg || game.home_ppg || fb;

  // away_ppg:
  //   NBA    → ataque do visitante (lógica original)
  //   Futebol → gols SOFRIDOS pelo visitante (perspectiva defensiva)
  //             salvo no KV como away_ppg pelo games-soccer.js
  const aPpg = saved?.away_ppg || game.away_ppg || fbA;

  const overUnder = game.over_under || saved?.over_under || null;
  const spread    = game.spread     || saved?.spread     || null;

  let projDisplay, avgDisplay;
  if (isBra) {
    // Projeção = média entre ataque mandante e defesa visitante
    // Representa os gols esperados DO MANDANTE
    const proj = (isFinal && saved?.proj)
      ? saved.proj
      : parseFloat(((hPpg + aPpg) / 2).toFixed(2));
    projDisplay = proj;
    avgDisplay  = proj; // avg e proj são o mesmo número no modelo por time
  } else {
    // NBA: soma dos dois PPGs
    projDisplay = (isFinal && saved?.proj) ? saved.proj : (hPpg + aPpg);
    avgDisplay  = parseFloat((projDisplay / 2).toFixed(1));
  }

  const realTotal = (game.hs != null && game.vs != null)
    ? (isBra ? game.hs : game.hs + game.vs)  // futebol: gols do mandante; NBA: total
    : null;

  // Odd O/U válida para futebol só se <= 3.5 (linha de gols por time, não total)
  const validOU = overUnder && (!isBra || overUnder <= 3.5) ? overUnder : null;

  const result = isFinal
    ? calcResult(saved?.proj || projDisplay, validOU, realTotal)
    : null;

  return { hPpg, aPpg, avg: avgDisplay, proj: projDisplay, realTotal, result, overUnder: validOU, spread };
}

function calcResult(proj,overUnder,realTotal){
  if(!overUnder||realTotal==null)return null;
  return(proj>overUnder)===(realTotal>overUnder)?"hit":"miss";
}

// ── Sugestões (compartilhadas NBA + Brasileirão) ──────────────────
function countFields(histData){
  if(!histData)return{above:0,below:0,total:0};
  const fields=[
    {above:histData.home.above,      total:histData.home.total},
    {above:histData.home.last5.above,total:histData.home.last5.total},
    {above:histData.away.above,      total:histData.away.total},
    {above:histData.away.last5.above,total:histData.away.last5.total},
  ];
  let above=0,below=0,valid=0;
  for(const f of fields){
    if(f.total===0)continue;
    valid++;
    if(fieldIsAbove(f.above,f.total))above++;else below++;
  }
  return{above,below,total:valid};
}
function suggestion1(proj,ou){if(!ou)return null;return proj>ou?"OVER":proj<ou?"UNDER":null;}
function suggestion2(proj,ou,hist){
  const base=suggestion1(proj,ou);if(!base||!hist)return null;
  const{above,below,total}=countFields(hist);if(total<3)return null;
  if(base==="OVER"&&above>=3)return"OVER";if(base==="UNDER"&&below>=3)return"UNDER";
  return"NÃO APOSTE";
}
function suggestion3(hist){
  if(!hist)return null;const{above,below,total}=countFields(hist);if(total<3)return null;
  if(above>=3)return"OVER";if(below>=3)return"UNDER";return"NÃO APOSTE";
}
function suggestion4(proj,ou,hist){
  const base=suggestion1(proj,ou);if(!base)return null;if(!hist)return base;
  const{above,below,total}=countFields(hist);if(total<3)return base;
  const cd=above>=3?"OVER":below>=3?"UNDER":null;
  if(!cd)return base;if(cd===base)return base;return cd;
}
function suggestion5(proj,ou,hist,minDiv){
  const base=suggestion1(proj,ou);if(!base||!ou)return null;if(!hist)return null;
  const{above,below,total}=countFields(hist);if(total<3)return null;
  if(Math.abs(proj-ou)<minDiv)return"NÃO APOSTE";
  const cd=above>=3?"OVER":below>=3?"UNDER":null;
  if(!cd||cd!==base)return"NÃO APOSTE";return base;
}
function calcResultForSuggestion(s,ou,real){
  if(!s||!ou||real==null)return null;if(s==="NÃO APOSTE")return"skip";
  const realOver=real>ou;if(s==="OVER")return realOver?"hit":"miss";if(s==="UNDER")return!realOver?"hit":"miss";return null;
}

// ── Hist cache ────────────────────────────────────────────────────
const histCache={};
async function fetchHist(homeId,awayId,avg,sport){
  // Para Brasileirão usa endpoint diferente (gols) para os últimos 5 e temporada
  const endpoint = sport.id==="bra" ? "/api/history-soccer" : "/api/history";
  const key=`${sport.id}_${homeId}_${awayId}_${avg}`;
  if(histCache[key])return histCache[key];
  try{
    const r=await fetch(`${endpoint}?home_id=${homeId}&away_id=${awayId}&matchup_avg=${avg}`);
    const d=await r.json();histCache[key]=d;return d;
  }catch{return null;}
}

// ── Kelly ─────────────────────────────────────────────────────────
function kellyFraction(p,odds){const b=odds-1,q=1-p;return(b*p-q)/b;}
function estimateProb(acc,div){
  const base=Math.min(0.75,Math.max(0.4,acc));
  const bonus=Math.min(0.10,(Math.abs(div)/5)*0.02);
  return Math.min(0.75,base+bonus);
}

function RuleChip({suggestion,result}){
  const isSkip=!suggestion||suggestion==="NÃO APOSTE";
  const col=isSkip?TEXT3:suggestion==="OVER"?GREEN:"#6fa3ff";
  const bg=isSkip?"rgba(80,80,80,0.15)":suggestion==="OVER"?"rgba(0,200,83,0.12)":"rgba(29,66,138,0.2)";
  const bd=isSkip?"rgba(80,80,80,0.3)":suggestion==="OVER"?"rgba(0,200,83,0.3)":"rgba(29,66,138,0.5)";
  const iconCol=result==="hit"?HIT_COLOR:result==="miss"?MISS_COLOR:TEXT3;
  const icon=result==="hit"?" ✓":result==="miss"?" ✗":result==="skip"?" —":"";
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:2,padding:"2px 8px",borderRadius:6,background:bg,border:`1px solid ${bd}`,fontSize:11,fontWeight:700,color:col}}>
      {isSkip?"N/A":suggestion}
      {icon&&<span style={{color:iconCol,fontSize:11}}>{icon}</span>}
    </span>
  );
}

// ── AccuracyReport ────────────────────────────────────────────────
function AccuracyReport({schedule,weekDates,selDate,savedOddsMap,sport}){
  const dayGames=(schedule[selDate]||[]).filter(g=>g.status==="Final");
  const weekGames=weekDates.flatMap(d=>(schedule[d]||[]).filter(g=>g.status==="Final"));
  const countHits=games=>{
    const wo=games.filter(g=>!!getGameStats(g,savedOddsMap,sport).overUnder);
    const h=wo.filter(g=>getGameStats(g,savedOddsMap,sport).result==="hit");
    return{hits:h.length,total:wo.length};
  };
  const day=countHits(dayGames),week=countHits(weekGames);
  if(day.total===0&&week.total===0)return null;
  const pct=(h,t)=>t>0?Math.round((h/t)*100):0;
  const accentColor=sport.primary;
  return(
    <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1rem 1.25rem",marginBottom:"1.25rem",display:"flex",gap:"1.5rem",alignItems:"center"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",flexShrink:0}}>Precisão O/U</div>
      {day.total>0&&(<div style={{display:"flex",alignItems:"center",gap:12}}>
        <div>
          <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Hoje</div>
          <div style={{fontSize:18,fontWeight:800,color:pct(day.hits,day.total)>=50?HIT_COLOR:MISS_COLOR}}>{day.hits}/{day.total}</div>
          <div style={{fontSize:9,color:TEXT3}}>{pct(day.hits,day.total)}%</div>
        </div>
        <div style={{width:1,height:36,background:BORDER}}/>
      </div>)}
      {week.total>0&&(<div>
        <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Últimos 7 dias</div>
        <div style={{fontSize:18,fontWeight:800,color:pct(week.hits,week.total)>=50?HIT_COLOR:MISS_COLOR}}>{week.hits}/{week.total}</div>
        <div style={{fontSize:9,color:TEXT3}}>{pct(week.hits,week.total)}%</div>
      </div>)}
      {week.total>0&&(<div style={{flex:1,height:6,background:SURFACE2,borderRadius:3,overflow:"hidden",maxWidth:120}}>
        <div style={{width:`${pct(week.hits,week.total)}%`,height:"100%",background:pct(week.hits,week.total)>=50?HIT_COLOR:MISS_COLOR,borderRadius:3}}/>
      </div>)}
    </div>
  );
}

// ── OddsPanel ─────────────────────────────────────────────────────
function OddsPanel({proj,overUnder,spread,result,realTotal,sport}){
  if(!overUnder)return null;
  const diff=proj-overUnder;
  const isBra=sport.id==="bra";
  const threshold=isBra?0.3:3;
  const col=Math.abs(diff)>=threshold?(diff>0?GREEN:MISS_COLOR):TEXT2;
  const diffStr=(diff>0?"+":"")+diff.toFixed(isBra?2:1);
  const sugDir=diff>0?"OVER":"UNDER";
  return(
    <div style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:10,padding:"1rem",marginTop:"1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}}>
        <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em"}}>
          Odds {isBra?"bet365":"DraftKings"}
        </div>
        {result&&(
          <div style={{padding:"2px 10px",borderRadius:20,background:result==="hit"?"rgba(0,200,83,0.15)":"rgba(200,16,46,0.15)",border:`1px solid ${result==="hit"?"rgba(0,200,83,0.4)":"rgba(200,16,46,0.4)"}`}}>
            <span style={{fontSize:10,fontWeight:700,color:result==="hit"?HIT_COLOR:MISS_COLOR}}>
              {result==="hit"?"✓ Acerto":"✗ Erro"} · Real: {realTotal} {sport.divLabel}
            </span>
          </div>
        )}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:"0.75rem"}}>
        {[["Linha O/U",overUnder.toFixed(isBra?1:1)],[`Proj. ${sport.statLabel}`,proj.toFixed(isBra?2:1)],["Diferença",diffStr]].map(([l,v],i)=>(
          <div key={l} style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:TEXT3,marginBottom:3}}>{l}</div>
            <div style={{fontSize:16,fontWeight:700,color:i===2?col:TEXT}}>{v}</div>
          </div>
        ))}
      </div>
      {!result&&(
        <div style={{display:"flex",justifyContent:"center",gap:8}}>
          <div style={{padding:"3px 12px",borderRadius:20,background:diff>0?"rgba(0,200,83,0.12)":"rgba(200,16,46,0.12)",border:`1px solid ${diff>0?"rgba(0,200,83,0.3)":"rgba(200,16,46,0.3)"}`}}>
            <span style={{fontSize:11,fontWeight:700,color:diff>0?GREEN:MISS_COLOR}}>
              {sport.statLabel} sugere {sugDir} {overUnder.toFixed(1)}
            </span>
          </div>
          {spread&&<div style={{padding:"3px 12px",borderRadius:20,background:SURFACE,border:`1px solid ${BORDER}`}}>
            <span style={{fontSize:11,color:TEXT2}}>{isBra?"Handicap":"Spread"}: {spread}</span>
          </div>}
        </div>
      )}
    </div>
  );
}

// ── HistoryPanel ─────────────────────────────────────────────────
function HistoryPanel({homeId,awayId,matchupAvg,homeAbbr,awayAbbr,sport,onHistoryLoaded}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const isBra=sport.id==="bra";
  const endpoint=isBra?"/api/history-soccer":"/api/history";
  useEffect(()=>{
    if(!homeId||!awayId)return;
    setLoading(true);
    fetch(`${endpoint}?home_id=${homeId}&away_id=${awayId}&matchup_avg=${matchupAvg}`)
      .then(r=>r.json()).then(d=>{setData(d);setLoading(false);if(onHistoryLoaded)onHistoryLoaded(d);})
      .catch(()=>setLoading(false));
  },[homeId,awayId,matchupAvg]);
  const label=isBra?"gols acima da média do confronto":"jogos acima da média do confronto";
  const unit=isBra?"gl":"pts";
  return(
    <div style={{borderTop:`1px solid ${BORDER}`,paddingTop:"1.25rem",marginTop:"1rem"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"1rem"}}>
        {label} — {matchupAvg.toFixed(isBra?2:1)} {unit}
      </div>
      {loading&&<div style={{fontSize:11,color:TEXT3}}>Carregando histórico...</div>}
      {!loading&&!data&&<div style={{fontSize:11,color:TEXT3}}>Histórico indisponível</div>}
      {data&&[
        {label:`Temporada (${data.home.total}j)`,hA:data.home.above,aA:data.away.above,hn:data.home.total,an:data.away.total},
        {label:"Últimos 5 jogos",hA:data.home.last5.above,aA:data.away.last5.above,hn:data.home.last5.total,an:data.away.last5.total},
      ].map(({label,hA,aA,hn,an})=>(
        <div key={label} style={{marginBottom:"0.85rem"}}>
          <div style={{fontSize:10,color:TEXT2,marginBottom:6,fontWeight:500}}>{label}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 36px 1fr",gap:8,alignItems:"center"}}>
            <div><div style={{fontSize:11,color:TEXT3,marginBottom:4}}>{homeAbbr}</div><ScoreBar above={hA} total={hn}/></div>
            <div style={{textAlign:"center",fontSize:9,color:TEXT3}}>vs</div>
            <div><div style={{fontSize:11,color:TEXT3,marginBottom:4}}>{awayAbbr}</div><ScoreBar above={aA} total={an}/></div>
          </div>
        </div>
      ))}
      {data&&isBra&&<div style={{fontSize:9,color:TEXT3,marginTop:4}}>Campos 1-2: gols marcados (mandante). Campos 3-4: gols sofridos (adversário).</div>}
      {data&&!isBra&&<div style={{fontSize:9,color:TEXT3,marginTop:4}}>Dados reais da temporada ESPN</div>}
    </div>
  );
}

// ── BettingSimulator ──────────────────────────────────────────────
function BettingSimulator({schedule,weekDates,savedOddsMap,selDate,sport}){
  const [banca,setBanca]=useState(1000);
  const defaultMinDiv=sport.id==="bra"?0.3:5;
  const [minDiv,setMinDiv]=useState(defaultMinDiv);
  const [kFrac,setKFrac]=useState(0.5);
  const [maxPct,setMaxPct]=useState(5);
  const isBra=sport.id==="bra";
  const weekGames=weekDates.flatMap(d=>(schedule[d]||[]).filter(g=>g.status==="Final"));
  const withOdds=weekGames.filter(g=>!!getGameStats(g,savedOddsMap,sport).overUnder);
  const hits=withOdds.filter(g=>getGameStats(g,savedOddsMap,sport).result==="hit");
  const histAcc=withOdds.length>0?hits.length/withOdds.length:0.55;
  const todayGames=(schedule[selDate]||[]).filter(g=>g.status!=="Final"&&!!getGameStats(g,savedOddsMap,sport).overUnder);
  const allocations=todayGames.map(g=>{
    const{proj,overUnder}=getGameStats(g,savedOddsMap,sport);
    const div=proj-overUnder;const absDiv=Math.abs(div);
    if(absDiv<minDiv)return{game:g,reason:"divergência insuficiente",alloc:0};
    const p=estimateProb(histAcc,div);const odds=1.91;const kf=kellyFraction(p,odds);
    if(kf<=0)return{game:g,reason:"edge negativo",alloc:0};
    const rawPct=kf*kFrac*100;const cappedPct=Math.min(maxPct,rawPct);
    const alloc=parseFloat(((cappedPct/100)*banca).toFixed(2));
    const side=div>0?"OVER":"UNDER";const retorno=parseFloat((alloc*(odds-1)).toFixed(2));
    return{game:g,div,absDiv,p,kf,rawPct,cappedPct,alloc,side,retorno,overUnder,reason:null};
  });
  const eligible=allocations.filter(a=>a.alloc>0);
  const excluded=allocations.filter(a=>a.alloc===0);
  const totalAlloc=eligible.reduce((s,a)=>s+a.alloc,0);
  const totalRet=eligible.reduce((s,a)=>s+a.retorno,0);
  const pctBanca=parseFloat(((totalAlloc/banca)*100).toFixed(1));
  const divStep=isBra?0.1:1;const divMax=isBra?3:20;
  return(
    <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1.25rem",marginBottom:"1.25rem"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"1rem"}}>Simulador — Kelly</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:"1.25rem"}}>
        {[["Banca (R$)",banca,setBanca,50,100000,50],[`Div. mínima (${sport.divLabel})`,minDiv,setMinDiv,divStep,divMax,divStep],["Nível de risco",kFrac,setKFrac,0.1,1,0.05],["Teto por jogo (%)",maxPct,setMaxPct,1,20,1]].map(([label,val,setter,min,max,step])=>(
          <div key={label}>
            <div style={{fontSize:9,color:TEXT3,marginBottom:4}}>{label}</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <input type="range" min={min} max={max} step={step} value={val} onChange={e=>setter(Number(e.target.value))} style={{flex:1}}/>
              <span style={{fontSize:13,fontWeight:700,color:TEXT,minWidth:40,textAlign:"right"}}>{val}</span>
            </div>
          </div>
        ))}
      </div>
      <div style={{background:SURFACE2,borderRadius:8,padding:"8px 12px",marginBottom:"1rem",display:"flex",alignItems:"center",gap:12}}>
        <div>
          <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Acurácia (7 dias)</div>
          <div style={{fontSize:16,fontWeight:800,color:histAcc>=0.5?HIT_COLOR:MISS_COLOR}}>{hits.length}/{withOdds.length} — {Math.round(histAcc*100)}%</div>
        </div>
      </div>
      {todayGames.length===0&&<div style={{textAlign:"center",padding:"1.5rem 0",color:TEXT3,fontSize:12}}>Nenhum jogo com odds disponíveis.</div>}
      {eligible.length>0&&(<>
        <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Selecionados ({eligible.length})</div>
        {eligible.map(a=>{
          const hA=a.game.home_abbr||a.game.home.split(" ").pop();
          const aA=a.game.away_abbr||a.game.away.split(" ").pop();
          return(<div key={a.game.id} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:TEXT,marginBottom:4}}>{hA} vs {aA}</div>
                <div style={{fontSize:11,color:TEXT2}}>Apostar: <span style={{color:a.side==="OVER"?HIT_COLOR:"#6fa3ff",fontWeight:700}}>{a.side} {a.overUnder}</span></div>
                <div style={{fontSize:11,color:TEXT2}}>Diverg.: <span style={{color:TEXT}}>{a.div>0?"+":""}{a.div.toFixed(isBra?2:1)} {sport.divLabel}</span></div>
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                <div style={{fontSize:18,fontWeight:800,color:HIT_COLOR}}>R$ {a.alloc.toFixed(2)}</div>
                <div style={{fontSize:10,color:TEXT3}}>{a.cappedPct.toFixed(1)}% da banca</div>
                <div style={{fontSize:10,color:TEXT3}}>ret.: R$ {a.retorno.toFixed(2)}</div>
              </div>
            </div>
          </div>);
        })}
        <div style={{background:SURFACE2,borderRadius:10,padding:"10px 12px",border:`1px solid ${BORDER}`,marginTop:4}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {[["Total alocado",`R$ ${totalAlloc.toFixed(2)}`],["% da banca",`${pctBanca}%`],["Ret. potencial",`R$ ${totalRet.toFixed(2)}`]].map(([l,v])=>(
              <div key={l} style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>{l}</div>
                <div style={{fontSize:14,fontWeight:700,color:TEXT}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </>)}
      {excluded.length>0&&(<div style={{marginTop:"1rem"}}>
        <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Excluídos ({excluded.length})</div>
        {excluded.map(a=>{
          const hA=a.game.home_abbr||a.game.home.split(" ").pop();
          const aA=a.game.away_abbr||a.game.away.split(" ").pop();
          return(<div key={a.game.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",borderRadius:8,background:SURFACE2,marginBottom:4,opacity:0.5}}>
            <span style={{fontSize:11,color:TEXT2}}>{hA} vs {aA}</span>
            <span style={{fontSize:10,color:TEXT3}}>{a.reason}</span>
          </div>);
        })}
      </div>)}
      <div style={{fontSize:9,color:TEXT3,marginTop:"1rem"}}>Odds padrão O/U: -110 (1.91x) · Modelo analítico</div>
    </div>
  );
}

// ── RulesAnalysis ─────────────────────────────────────────────────
function RulesAnalysis({schedule,weekDates,savedOddsMap,sport}){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const mountedRef=useRef(true);
  const isBra=sport.id==="bra";
  useEffect(()=>{mountedRef.current=true;return()=>{mountedRef.current=false;};},[]);
  useEffect(()=>{
    const finalGames=weekDates.flatMap(d=>(schedule[d]||[])).filter(g=>g.status==="Final");
    if(!finalGames.length){setLoading(false);return;}
    setLoading(true);
    const eligible=finalGames.filter(g=>{
      const{overUnder,realTotal}=getGameStats(g,savedOddsMap,sport);
      return!!overUnder&&realTotal!=null;
    });
    if(!eligible.length){setLoading(false);return;}
    Promise.all(eligible.map(async g=>{
      const{hPpg,aPpg,avg,proj,overUnder,realTotal}=getGameStats(g,savedOddsMap,sport);
      const histData=g.home_id&&g.away_id?await fetchHist(g.home_id,g.away_id,avg,sport):null;
      const sug1=suggestion1(proj,overUnder);
      const sug2=suggestion2(proj,overUnder,histData);
      const sug3=suggestion3(histData);
      const sug4=suggestion4(proj,overUnder,histData);
      const sug5=suggestion5(proj,overUnder,histData,sport.minDiv);
      const res1=calcResultForSuggestion(sug1,overUnder,realTotal);
      const res2=calcResultForSuggestion(sug2,overUnder,realTotal);
      const res3=calcResultForSuggestion(sug3,overUnder,realTotal);
      const res4=calcResultForSuggestion(sug4,overUnder,realTotal);
      const res5=calcResultForSuggestion(sug5,overUnder,realTotal);
      const hAbbr=g.home_abbr||g.home.split(" ").pop();
      const aAbbr=g.away_abbr||g.away.split(" ").pop();
      const fields=histData?[
        {label:`${hAbbr} temp.`,above:histData.home.above,total:histData.home.total},
        {label:`${hAbbr} ult5`,above:histData.home.last5.above,total:histData.home.last5.total},
        {label:`${aAbbr} def.temp.`,above:histData.away.above,total:histData.away.total},
        {label:`${aAbbr} def.ult5`,above:histData.away.last5.above,total:histData.away.last5.total},
      ]:null;
      return{g,hAbbr,aAbbr,proj,overUnder,realTotal,sug1,sug2,sug3,sug4,sug5,res1,res2,res3,res4,res5,histData,fields};
    })).then(results=>{if(mountedRef.current){setRows(results);setLoading(false);}});
  },[schedule,weekDates,savedOddsMap,sport]);

  const count=res=>rows.filter(r=>res(r)==="hit").length;
  const total=res=>rows.filter(r=>res(r)==="hit"||res(r)==="miss").length;
  const skipped=res=>rows.filter(r=>res(r)==="skip").length;
  const pct=(h,t)=>t>0?Math.round((h/t)*100):0;
  const h1=count(r=>r.res1),t1=total(r=>r.res1);
  const h2=count(r=>r.res2),t2=total(r=>r.res2),s2=skipped(r=>r.res2);
  const h3=count(r=>r.res3),t3=total(r=>r.res3),s3=skipped(r=>r.res3);
  const h4=count(r=>r.res4),t4=total(r=>r.res4),s4=skipped(r=>r.res4);
  const h5=count(r=>r.res5),t5=total(r=>r.res5),s5=skipped(r=>r.res5);
  const best=[{i:1,pct:pct(h1,t1)},{i:2,pct:pct(h2,t2)},{i:3,pct:pct(h3,t3)},{i:4,pct:pct(h4,t4)},{i:5,pct:pct(h5,t5)}].sort((a,b)=>b.pct-a.pct)[0]?.i;
  const statL=sport.statLabel;
  const RULE_LABELS=["Regra 1 — PPG vs Odd",`Regra 2 — ${statL} + Campos`,`Regra 3 — Só Campos`,"Regra 4 — Campos árbitro","Regra 5 — Convergência forte"];
  const RULE_DESC=[`Proj ${statL} > Odd → OVER | Proj < Odd → UNDER`,`Mesma direção do ${statL}, validada por ≥3/4 campos`,"≥3 campos acima → OVER | ≥3 abaixo → UNDER | senão N/A",`Campos conflitam com ${statL} e ≥3 → seguir campos; senão ${statL}`,`${statL} + campos mesma dir. E diverg. ≥${sport.minDiv} ${sport.divLabel}; senão N/A`];
  const YELLOW="#FFD600";
  if(loading)return<div style={{padding:"3rem 2rem",textAlign:"center",color:TEXT3,fontSize:13}}>Carregando análise...</div>;
  if(!rows.length)return<div style={{padding:"3rem 2rem",textAlign:"center",color:TEXT3,fontSize:13}}>Nenhum jogo finalizado com odds disponíveis.</div>;
  const decLabel=sport.id==="bra"?2:1;
  return(
    <div style={{padding:"1.5rem 2rem",maxWidth:1000,margin:"0 auto"}}>
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:4}}>Análise comparativa — últimos 7 dias</div>
        <div style={{fontSize:22,fontWeight:800,color:TEXT,letterSpacing:"-0.3px"}}>Taxa de Acerto por Regra</div>
        <div style={{fontSize:12,color:TEXT2,marginTop:4}}>{rows.length} jogo(s) · threshold: maioria simples · zona neutra: {sport.id==="bra"?`±${sport.neutralZone} gols`:"N/A"}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:"2rem"}}>
        {[[h1,t1,0,0],[h2,t2,s2,1],[h3,t3,s3,2],[h4,t4,s4,3],[h5,t5,s5,4]].map(([h,t,sk,i])=>{
          const p=pct(h,t);const isBest=(i+1)===best;
          return(
            <div key={i} style={{background:SURFACE,border:`2px solid ${isBest?YELLOW:BORDER}`,borderRadius:12,padding:"1.25rem",position:"relative",overflow:"hidden"}}>
              {isBest&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:YELLOW}}/>}
              {isBest&&<div style={{position:"absolute",top:8,right:10,fontSize:9,color:YELLOW,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>✦ Melhor</div>}
              <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>{RULE_LABELS[i]}</div>
              <div style={{fontSize:36,fontWeight:800,color:p>=50?HIT_COLOR:MISS_COLOR,lineHeight:1,marginBottom:4}}>{p}%</div>
              <div style={{fontSize:13,color:TEXT2,marginBottom:8}}>{h}/{t} acertos</div>
              {sk>0&&<div style={{fontSize:10,color:TEXT3,marginBottom:8}}>{sk} N/A</div>}
              <div style={{height:5,background:SURFACE2,borderRadius:3,overflow:"hidden",marginBottom:8}}>
                <div style={{width:`${p}%`,height:"100%",background:p>=50?HIT_COLOR:MISS_COLOR,borderRadius:3}}/>
              </div>
              <div style={{fontSize:9,color:TEXT3,lineHeight:1.5}}>{RULE_DESC[i]}</div>
            </div>
          );
        })}
      </div>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Detalhe por jogo</div>
      <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 4fr",gap:0,borderBottom:`1px solid ${BORDER}`,padding:"8px 14px"}}>
          {["Jogo","Real","O/U","R1","R2","R3","R4","R5 + campos"].map(h=>(
            <div key={h} style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>{h}</div>
          ))}
        </div>
        {rows.map(({g,hAbbr,aAbbr,overUnder,realTotal,sug1,sug2,sug3,sug4,sug5,res1,res2,res3,res4,res5,fields},idx)=>(
          <div key={g.id} style={{borderBottom:idx<rows.length-1?`1px solid ${BORDER}`:"none"}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr 1fr 1fr 4fr",gap:0,padding:"10px 14px",alignItems:"center"}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:TEXT}}>{hAbbr} vs {aAbbr}</div>
                <div style={{fontSize:10,color:TEXT3}}>{g.home.split(" ").slice(-1)[0]} vs {g.away.split(" ").slice(-1)[0]}</div>
              </div>
              <div style={{fontSize:14,fontWeight:700,color:TEXT}}>{realTotal}</div>
              <div style={{fontSize:13,color:TEXT2}}>{overUnder?.toFixed(decLabel)}</div>
              <div><RuleChip suggestion={sug1} result={res1}/></div>
              <div><RuleChip suggestion={sug2} result={res2}/></div>
              <div><RuleChip suggestion={sug3} result={res3}/></div>
              <div><RuleChip suggestion={sug4} result={res4}/></div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <RuleChip suggestion={sug5} result={res5}/>
                {fields&&(<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:2}}>
                  {fields.map(f=>{
                    const isAbove=fieldIsAbove(f.above,f.total);
                    return(<span key={f.label} style={{fontSize:9,color:isAbove?GREEN:MISS_COLOR,background:isAbove?"rgba(0,200,83,0.08)":"rgba(200,16,46,0.08)",border:`1px solid ${isAbove?"rgba(0,200,83,0.2)":"rgba(200,16,46,0.2)"}`,borderRadius:4,padding:"1px 5px"}}>
                      {f.label} {f.above}/{f.total}
                    </span>);
                  })}
                </div>)}
              </div>
            </div>
          </div>
        ))}
      </div>
      <div style={{marginTop:"1.25rem",display:"flex",gap:16,flexWrap:"wrap"}}>
        {[["✓ hit","acertou",HIT_COLOR],["✗ miss","errou",MISS_COLOR],["— N/A","não apostar / sem dados",TEXT3]].map(([icon,desc,col])=>(
          <div key={icon} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:TEXT3}}>
            <span style={{color:col,fontWeight:700}}>{icon}</span> = {desc}
          </div>
        ))}
        {sport.id==="bra"&&<div style={{fontSize:10,color:TEXT3}}>· Neutros (±{sport.neutralZone} gols) excluídos dos campos</div>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// ── App ───────────────────────────────────────────────────────────
function App(){
  const weekDates = getDateWindow();
  const todayStr=getBrazilToday();
  const [sportId,setSportId]=useState("nba");       // "nba" | "bra"
  const [activeTab,setActiveTab]=useState("jogos"); // "jogos" | "regras"
  const [selDate,setSelDate]=useState(todayStr);
  const [schedules,setSchedules]=useState({nba:{},bra:{}});
  const [savedOddsMaps,setSavedOddsMaps]=useState({nba:{},bra:{}});
  const [editing,setEditing]=useState(null);
  const [loadings,setLoadings]=useState({nba:true,bra:true});
  const [updatedAts,setUpdatedAts]=useState({nba:null,bra:null});

  const sport=SPORTS[sportId];
  const schedule=schedules[sportId];
  const savedOddsMap=savedOddsMaps[sportId];
  const loading=loadings[sportId];
  const updatedAt=updatedAts[sportId];

  // Carrega dados de um esporte
  async function loadSport(sid){
    setLoadings(p=>({...p,[sid]:true}));
    try{
      const dates=getDateWindow();
      const start=dates[0].replace(/-/g,"");
      const end=dates[13].replace(/-/g,"");
      const endpoint=sid==="bra"?"/api/games-soccer":"/api/games";
      const r=await fetch(`${endpoint}?bust=${Date.now()}&start=${start}&end=${end}`);
      const d=await r.json();
      if(d.schedule){
        setSchedules(p=>({...p,[sid]:d.schedule}));
        setUpdatedAts(p=>({...p,[sid]:new Date()}));
        const allGames=Object.values(d.schedule).flat();
        await saveOddsToKV(allGames,SPORTS[sid]);
        const finalIds=allGames.filter(g=>g.status==="Final"&&!g.over_under).map(g=>String(g.id));
        if(finalIds.length){
          const om=await loadOddsFromKV(finalIds);
          setSavedOddsMaps(p=>({...p,[sid]:{...p[sid],...om}}));
        }
      }
    }catch(e){console.error(e);}
    finally{setLoadings(p=>({...p,[sid]:false}));}
  }

  useEffect(()=>{
    loadSport("nba");loadSport("bra");
    const id=setInterval(()=>{loadSport("nba");loadSport("bra");},30*60*1000);
    return()=>clearInterval(id);
  },[]);

  const selGames=schedule[selDate]||[];
  const finals=selGames.filter(g=>g.status==="Final").length;

  function handleSave(hs,vs){
    setSchedules(p=>({...p,[sportId]:{...p[sportId],[selDate]:p[sportId][selDate].map(g=>g.id===editing.id?{...g,hs,vs,status:"Final"}:g)}}));
    setEditing(null);
  }

  // Sport selector colors
  const sp=sport;
  const otherSport=SPORTS[sportId==="nba"?"bra":"nba"];

  return(
    <div style={{background:BG,minHeight:"100vh",fontFamily:"inherit"}}>
      {editing&&<EditModal game={editing} onSave={handleSave} onClose={()=>setEditing(null)} sport={sport}/>}

      {/* ── Header ── */}
      <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`}}>
        <div style={{maxWidth:1800,margin:"0 auto",padding:"1rem 2rem 0"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>

              {/* Sport selector */}
              <div style={{display:"flex",border:`1px solid ${BORDER}`,borderRadius:8,overflow:"hidden",flexShrink:0}}>
                {Object.values(SPORTS).map(s=>(
                  <button key={s.id} onClick={()=>{setSportId(s.id);setActiveTab("jogos");}}
                    style={{padding:"7px 16px",fontSize:12,fontWeight:sportId===s.id?700:400,
                      background:sportId===s.id?s.primary:"transparent",
                      color:sportId===s.id?"#fff":TEXT2,border:"none",cursor:"pointer",
                      borderRight:s.id==="nba"?`1px solid ${BORDER}`:"none",transition:"background .15s"}}>
                    {s.icon} {s.label}
                  </button>
                ))}
              </div>

              {/* Title */}
              <div>
                <div style={{fontSize:9,color:TEXT2,textTransform:"uppercase",letterSpacing:"0.15em",fontWeight:600}}>
                  {sport.season}
                </div>
                <div style={{fontSize:26,fontWeight:800,color:TEXT,letterSpacing:"-0.5px"}}>
                  Análise de Confrontos
                </div>
              </div>
            </div>
            <div style={{textAlign:"right",fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>
              {updatedAt?"ESPN · "+updatedAt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"carregando..."}
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:"flex",gap:0}}>
            {[["jogos","📅 Jogos"],["regras","📊 Análise de regras"]].map(([tab,label])=>(
              <button key={tab} onClick={()=>setActiveTab(tab)} style={{
                background:"transparent",color:activeTab===tab?TEXT:TEXT3,
                border:"none",borderBottom:activeTab===tab?`3px solid ${sport.secondary}`:`3px solid transparent`,
                padding:"8px 18px 10px",cursor:"pointer",fontSize:12,
                fontWeight:activeTab===tab?700:400,borderRadius:"4px 4px 0 0",
              }}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* ── Day selector carrossel ── */}
      {activeTab==="jogos"&&(
        <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`}}>
          <div style={{
            display:"flex",overflowX:"auto",scrollbarWidth:"none",
            msOverflowStyle:"none",padding:"0 2rem",
          }} ref={carouselRef}>
            <style>{`#day-carousel::-webkit-scrollbar{display:none}`}</style>
            {weekDates.map(d=>{
              const isToday=d===todayStr, isSel=d===selDate;
              const isPast=d<todayStr;
              const games=schedule[d]||[];
              const fin=games.filter(g=>g.status==="Final").length, tot=games.length;
              const dayName=DAYS_PT[new Date(d+"T12:00:00").getDay()];
              const dayNum=new Date(d+"T12:00:00").getDate();
              const dayHits=games.filter(g=>g.status==="Final"&&getGameStats(g,savedOddsMap,sport).result==="hit").length;
              const dayWithOdds=games.filter(g=>g.status==="Final"&&!!getGameStats(g,savedOddsMap,sport).overUnder).length;
              return(
                <button key={d} data-today={isToday?"true":undefined} onClick={()=>setSelDate(d)} style={{
                  flexShrink:0,width:72,
                  background:isSel?sport.primary:"transparent",
                  color:isSel?"#fff":isToday?sport.primary:isPast?TEXT3:TEXT2,
                  border:"none",
                  borderBottom:isSel?`3px solid ${sport.secondary}`:isToday?`3px solid ${sport.primary}`:"3px solid transparent",
                  padding:"8px 4px 10px",cursor:"pointer",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                  borderRadius:"4px 4px 0 0",
                }}>
                  <span style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>{dayName}</span>
                  <span style={{fontSize:15,fontWeight:800}}>{dayNum}</span>
                  <span style={{fontSize:9,color:isSel?"rgba(255,255,255,0.6)":TEXT3}}>
                    {tot>0?(fin>0?`${fin}/${tot}`:`${tot}j`):"—"}
                  </span>
                  {dayWithOdds>0&&<span style={{fontSize:8,color:isSel?"rgba(255,255,255,0.5)":dayHits/dayWithOdds>=0.5?"rgba(0,200,83,0.8)":"rgba(200,16,46,0.8)"}}>
                    {dayHits}/{dayWithOdds}
                  </span>}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Tab: Jogos ── */}
      {activeTab==="jogos"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 460px",gap:0,alignItems:"start",width:"100%"}}>
          <div style={{maxWidth:760,margin:"0 auto",width:"100%",padding:"1.25rem 0 1.25rem 2rem"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:"1.25rem"}}>
              {[["Jogos",selGames.length||"—"],["Finalizados",finals||"—"],[sport.id==="bra"?"Rodada":"+Alto proj.",sport.id==="bra"?(selGames[0]?.round||"—"):selGames.length>0?`${Math.round(Math.max(...selGames.map(g=>(g.home_ppg||0)+(g.away_ppg||0)).filter(Boolean),0))} pts`:"—"]].map(([l,v])=>(
                <div key={l} style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:10,padding:"0.75rem 1rem"}}>
                  <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>{l}</div>
                  <div style={{fontSize:20,fontWeight:800,color:TEXT}}>{v}</div>
                </div>
              ))}
            </div>
            <AccuracyReport schedule={schedule} weekDates={weekDates} selDate={selDate} savedOddsMap={savedOddsMap} sport={sport}/>
            {loading&&<div style={{textAlign:"center",padding:"3rem 0",color:TEXT3,fontSize:13}}>Carregando jogos...</div>}
            {!loading&&selGames.length===0&&<div style={{textAlign:"center",padding:"3rem 0",color:TEXT3,fontSize:13}}>Nenhum jogo para este dia.</div>}
            {selGames.map(g=><MatchupCard key={g.id} game={g} savedOddsMap={savedOddsMap} onEdit={setEditing} sport={sport}/>)}
            <div style={{fontSize:9,color:TEXT3,marginTop:"1rem",textAlign:"center",letterSpacing:"0.05em"}}>
              {sport.id==="bra"?"Jogos e estatísticas: ESPN API (bra.1) · Atualização a cada 30 min":"Jogos, PPG, odds e histórico: ESPN API · Atualização a cada 30 min"}
            </div>
          </div>
          <div style={{position:"sticky",top:0,height:"100vh",overflowY:"auto",borderLeft:`1px solid ${BORDER}`,background:SURFACE}}>
            <div style={{padding:"1.25rem"}}>
              <BettingSimulator schedule={schedule} weekDates={weekDates} savedOddsMap={savedOddsMap} selDate={selDate} sport={sport}/>
            </div>
          </div>
        </div>
      )}

      {/* ── Tab: Análise de Regras ── */}
      {activeTab==="regras"&&(
        <RulesAnalysis schedule={schedule} weekDates={weekDates} savedOddsMap={savedOddsMap} sport={sport}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
