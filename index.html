<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NBA 2025-26 · Análise de Confrontos</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button{font-family:inherit}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const NBA_BLUE="#1D428A", NBA_RED="#C8102E", NBA_WHITE="#fff";
const BG="#0a0a0a", SURFACE="#111", SURFACE2="#1a1a1a", BORDER="#242424";
const TEXT="#fff", TEXT2="#A0A0A0", TEXT3="#555";
const GREEN="#00C853", HIT_COLOR="#00C853", MISS_COLOR="#C8102E";
const DAYS_PT=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

const PPG_FB={
  "Detroit Pistons":117.2,"Boston Celtics":115.3,"New York Knicks":118.0,
  "Cleveland Cavaliers":120.0,"Toronto Raptors":113.8,"Philadelphia 76ers":116.2,
  "Orlando Magic":115.1,"Miami Heat":119.6,"Charlotte Hornets":115.7,
  "Atlanta Hawks":117.3,"Chicago Bulls":116.8,"Milwaukee Bucks":111.8,
  "Brooklyn Nets":107.7,"Indiana Pacers":111.1,"Washington Wizards":112.2,
  "Oklahoma City Thunder":120.2,"San Antonio Spurs":118.1,"Denver Nuggets":120.4,
  "Houston Rockets":114.6,"Minnesota Timberwolves":119.7,"Los Angeles Lakers":115.9,
  "Phoenix Suns":113.6,"Golden State Warriors":115.5,"LA Clippers":111.9,
  "Portland Trail Blazers":116.0,"Memphis Grizzlies":115.3,"Dallas Mavericks":114.1,
  "Utah Jazz":118.2,"New Orleans Pelicans":114.6,"Sacramento Kings":110.1,
};

function getBrazilToday(){
  return new Date(Date.now()-3*60*60*1000).toISOString().split("T")[0];
}
function getWeekDates(){
  const brt=new Date(Date.now()-3*60*60*1000);
  const mon=new Date(brt);
  mon.setDate(brt.getDate()-((brt.getDay()+6)%7));
  return Array.from({length:7},(_,i)=>{
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    return d.toISOString().split("T")[0];
  });
}

// Calcula se a projeção acertou o OVER/UNDER
// Acerto = projeção disse OVER e real ficou acima da linha OU projeção disse UNDER e real ficou abaixo
function calcResult(proj, overUnder, realTotal) {
  if (!overUnder || realTotal == null) return null;
  const projSaysOver = proj > overUnder;
  const realWasOver  = realTotal > overUnder;
  return projSaysOver === realWasOver ? "hit" : "miss";
}

function getGameStats(game) {
  const hPpg = game.home_ppg || PPG_FB[game.home] || 0;
  const aPpg = game.away_ppg || PPG_FB[game.away] || 0;
  const avg  = parseFloat(((hPpg + aPpg) / 2).toFixed(1));
  const proj = hPpg + aPpg;
  const realTotal = (game.hs != null && game.vs != null) ? game.hs + game.vs : null;
  const result = game.status === "Final" ? calcResult(proj, game.over_under, realTotal) : null;
  return { hPpg, aPpg, avg, proj, realTotal, result };
}

// Relatório de acertos do dia e da semana
function AccuracyReport({ schedule, weekDates, selDate }) {
  const dayGames   = (schedule[selDate] || []).filter(g => g.status === "Final");
  const weekGames  = weekDates.flatMap(d => (schedule[d] || []).filter(g => g.status === "Final"));

  const countHits = games => {
    const withOdds = games.filter(g => g.over_under);
    const hits = withOdds.filter(g => {
      const { proj, result } = getGameStats(g);
      return result === "hit";
    });
    return { hits: hits.length, total: withOdds.length };
  };

  const day  = countHits(dayGames);
  const week = countHits(weekGames);

  if (day.total === 0 && week.total === 0) return null;

  const pct = (h, t) => t > 0 ? Math.round((h / t) * 100) : 0;

  return (
    <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1rem 1.25rem",marginBottom:"1.25rem",display:"flex",gap:"1.5rem",alignItems:"center"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",flexShrink:0}}>Precisão O/U</div>
      {day.total > 0 && (
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div>
            <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Hoje</div>
            <div style={{fontSize:18,fontWeight:800,color:pct(day.hits,day.total)>=50?HIT_COLOR:MISS_COLOR}}>
              {day.hits}/{day.total}
            </div>
            <div style={{fontSize:9,color:TEXT3}}>{pct(day.hits,day.total)}%</div>
          </div>
          <div style={{width:1,height:36,background:BORDER}}/>
        </div>
      )}
      {week.total > 0 && (
        <div>
          <div style={{fontSize:9,color:TEXT3,marginBottom:2}}>Semana</div>
          <div style={{fontSize:18,fontWeight:800,color:pct(week.hits,week.total)>=50?HIT_COLOR:MISS_COLOR}}>
            {week.hits}/{week.total}
          </div>
          <div style={{fontSize:9,color:TEXT3}}>{pct(week.hits,week.total)}%</div>
        </div>
      )}
      {week.total > 0 && (
        <>
          <div style={{flex:1,height:6,background:SURFACE2,borderRadius:3,overflow:"hidden",maxWidth:120}}>
            <div style={{width:`${pct(week.hits,week.total)}%`,height:"100%",background:pct(week.hits,week.total)>=50?HIT_COLOR:MISS_COLOR,borderRadius:3}}/>
          </div>
        </>
      )}
    </div>
  );
}

function ScoreBar({above,total}){
  const pct=total>0?(above/total)*100:0,col=pct>=50?GREEN:NBA_RED;
  return(
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <div style={{flex:1,height:4,background:SURFACE2,borderRadius:2,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:2}}/>
      </div>
      <span style={{fontSize:11,fontWeight:500,color:col,minWidth:32,textAlign:"right"}}>{above}/{total}</span>
    </div>
  );
}

function OddsPanel({proj,overUnder,spread,result,realTotal}){
  if(!overUnder) return null;
  const diff=proj-overUnder;
  const col=Math.abs(diff)>=3?(diff>0?GREEN:NBA_RED):TEXT2;
  return(
    <div style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:10,padding:"1rem",marginTop:"1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}}>
        <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em"}}>Odds DraftKings</div>
        {result && (
          <div style={{padding:"2px 10px",borderRadius:20,background:result==="hit"?"rgba(0,200,83,0.15)":"rgba(200,16,46,0.15)",border:`1px solid ${result==="hit"?"rgba(0,200,83,0.4)":"rgba(200,16,46,0.4)"}`}}>
            <span style={{fontSize:10,fontWeight:700,color:result==="hit"?HIT_COLOR:MISS_COLOR}}>
              {result==="hit" ? "✓ Acerto" : "✗ Erro"} · Total real: {realTotal} pts
            </span>
          </div>
        )}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:"0.75rem"}}>
        {[["Linha O/U",overUnder.toFixed(1)],["Projeção PPG",proj.toFixed(1)],["Diferença",(diff>0?"+":"")+diff.toFixed(1)]].map(([l,v],i)=>(
          <div key={l} style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:TEXT3,marginBottom:3}}>{l}</div>
            <div style={{fontSize:16,fontWeight:700,color:i===2?col:TEXT}}>{v}</div>
          </div>
        ))}
      </div>
      {!result && (
        <div style={{display:"flex",justifyContent:"center",gap:8}}>
          <div style={{padding:"3px 12px",borderRadius:20,background:diff>0?"rgba(0,200,83,0.12)":"rgba(200,16,46,0.12)",border:`1px solid ${diff>0?"rgba(0,200,83,0.3)":"rgba(200,16,46,0.3)"}`}}>
            <span style={{fontSize:11,fontWeight:700,color:diff>0?GREEN:NBA_RED}}>PPG sugere {diff>0?"OVER":"UNDER"} {overUnder.toFixed(1)}</span>
          </div>
          {spread&&<div style={{padding:"3px 12px",borderRadius:20,background:SURFACE,border:`1px solid ${BORDER}`}}>
            <span style={{fontSize:11,color:TEXT2}}>Spread: {spread}</span>
          </div>}
        </div>
      )}
    </div>
  );
}

function HistoryPanel({homeId,awayId,matchupAvg,homeAbbr,awayAbbr}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    if(!homeId||!awayId) return;
    setLoading(true);
    fetch(`/api/history?home_id=${homeId}&away_id=${awayId}&matchup_avg=${matchupAvg}`)
      .then(r=>r.json()).then(d=>{setData(d);setLoading(false);})
      .catch(()=>setLoading(false));
  },[homeId,awayId,matchupAvg]);

  return(
    <div style={{borderTop:`1px solid ${BORDER}`,paddingTop:"1.25rem",marginTop:"1rem"}}>
      <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:"1rem"}}>
        jogos acima da média do confronto — {matchupAvg.toFixed(1)} pts
      </div>
      {loading&&<div style={{fontSize:11,color:TEXT3}}>Carregando histórico...</div>}
      {!loading&&!data&&<div style={{fontSize:11,color:TEXT3}}>Histórico indisponível</div>}
      {data&&[
        {label:`Temporada (${data.home.total}j)`,hA:data.home.above,aA:data.away.above,hn:data.home.total,an:data.away.total},
        {label:"Últimos 5 jogos",hA:data.home.last5.above,aA:data.away.last5.above,hn:data.home.last5.total,an:data.away.last5.total},
      ].map(({label,hA,aA,hn,an})=>(
        <div key={label} style={{marginBottom:"0.85rem"}}>
          <div style={{fontSize:10,color:TEXT2,marginBottom:6,fontWeight:500}}>{label}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 36px 1fr",gap:8,alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,color:TEXT3,marginBottom:4}}>{homeAbbr}</div>
              <ScoreBar above={hA} total={hn}/>
            </div>
            <div style={{textAlign:"center",fontSize:9,color:TEXT3}}>vs</div>
            <div>
              <div style={{fontSize:11,color:TEXT3,marginBottom:4}}>{awayAbbr}</div>
              <ScoreBar above={aA} total={an}/>
            </div>
          </div>
        </div>
      ))}
      {data&&<div style={{fontSize:9,color:TEXT3,marginTop:4}}>Dados reais da temporada ESPN</div>}
    </div>
  );
}

function EditModal({game,onSave,onClose}){
  const [hs,setHs]=useState(game.hs??"");
  const [vs,setVs]=useState(game.vs??"");
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
      <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:12,padding:"1.5rem",width:300}}>
        <div style={{height:3,background:`linear-gradient(90deg,${NBA_BLUE},${NBA_RED})`,borderRadius:2,marginBottom:"1.25rem"}}/>
        <div style={{fontSize:11,color:TEXT2,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"1.25rem",textAlign:"center"}}>Inserir placar final</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 24px 1fr",alignItems:"center",gap:8,marginBottom:"1.5rem"}}>
          {[["home",game.home_abbr||game.home.split(" ").pop(),hs,setHs],["away",game.away_abbr||game.away.split(" ").pop(),vs,setVs]].map(([side,label,val,set])=>(
            <div key={side} style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:TEXT2,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
              <input type="number" value={val} onChange={e=>set(e.target.value)}
                style={{width:"100%",background:SURFACE2,color:TEXT,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px 8px",fontSize:22,fontWeight:700,textAlign:"center"}}/>
            </div>
          ))}
          <div style={{textAlign:"center",color:TEXT3,fontSize:14,paddingTop:20}}>×</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,background:"transparent",color:TEXT2,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px",fontSize:13,cursor:"pointer"}}>Cancelar</button>
          <button onClick={()=>{if(hs!==""&&vs!=="")onSave(Number(hs),Number(vs));}} disabled={hs===""||vs===""}
            style={{flex:1,background:NBA_BLUE,color:NBA_WHITE,border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:600,cursor:hs===""||vs===""?"not-allowed":"pointer",opacity:hs===""||vs===""?0.4:1}}>
            Confirmar
          </button>
        </div>
      </div>
    </div>
  );
}

function MatchupCard({game,onEdit}){
  const { hPpg, aPpg, avg, proj, realTotal, result } = getGameStats(game);
  if(!hPpg||!aPpg) return null;

  const isFinal = game.status==="Final";
  const isLive  = !isFinal && game.status!=="Agendado";
  const hWin    = isFinal && game.hs > game.vs;
  const aWin    = isFinal && game.vs > game.hs;
  const hAbbr   = game.home_abbr || game.home.split(" ").pop();
  const aAbbr   = game.away_abbr || game.away.split(" ").pop();

  // Cor da borda/acento do card baseada no resultado
  const accentColor = isFinal && result === "hit" ? HIT_COLOR
                    : isFinal && result === "miss" ? MISS_COLOR
                    : isLive  ? GREEN
                    : null;

  const cardBorder = accentColor
    ? `1px solid ${accentColor}33`
    : `1px solid ${BORDER}`;

  return(
    <div style={{background:SURFACE,border:cardBorder,borderRadius:12,overflow:"hidden",marginBottom:"1rem"}}>
      {/* Barra de acento no topo */}
      <div style={{height:3,background:
        isFinal && result==="hit" ? HIT_COLOR :
        isFinal && result==="miss" ? MISS_COLOR :
        isLive ? GREEN : SURFACE2
      }}/>

      <div style={{padding:"1.25rem"}}>
        {/* Status + botão */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {isLive&&<span style={{width:7,height:7,borderRadius:"50%",background:GREEN,display:"inline-block"}}/>}
            <span style={{fontSize:10,fontWeight:600,color:
              isFinal && result==="hit" ? HIT_COLOR :
              isFinal && result==="miss" ? MISS_COLOR :
              isLive ? GREEN : TEXT3,
              textTransform:"uppercase",letterSpacing:"0.1em"
            }}>{game.status}</span>
          </div>
          <button onClick={()=>onEdit(game)} style={{background:"transparent",color:isFinal?TEXT3:NBA_BLUE,border:`1px solid ${isFinal?BORDER:NBA_BLUE}`,borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:500,cursor:"pointer"}}>
            {isFinal?"✎ editar":"+ placar"}
          </button>
        </div>

        {/* Times */}
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:8,marginBottom:"1.25rem"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:800,color:hWin?NBA_WHITE:isFinal?TEXT2:TEXT,letterSpacing:"-0.5px",lineHeight:1}}>{hAbbr}</div>
            <div style={{fontSize:10,color:TEXT2,marginTop:4}}>{game.home}</div>
            <div style={{fontSize:12,color:TEXT3,marginTop:2}}>{hPpg.toFixed(1)} PPG</div>
            {game.home_record&&<div style={{fontSize:10,color:TEXT3}}>{game.home_record}</div>}
            {(isFinal||isLive)&&<div style={{fontSize:30,fontWeight:800,color:hWin?NBA_WHITE:TEXT2,marginTop:8,lineHeight:1}}>{game.hs}</div>}
          </div>

          <div style={{textAlign:"center",padding:"0 4px"}}>
            <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>média</div>
            <div style={{fontSize:32,fontWeight:800,color:NBA_BLUE,lineHeight:1}}>{avg.toFixed(1)}</div>
            <div style={{fontSize:9,color:TEXT3,marginTop:6}}>pts/time</div>
            <div style={{marginTop:8,padding:"4px 10px",background:SURFACE2,borderRadius:6,border:`1px solid ${BORDER}`}}>
              <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>total proj.</div>
              <div style={{fontSize:14,fontWeight:700,color:TEXT}}>{Math.round(proj)}</div>
            </div>
            {/* Total real vs projetado */}
            {isFinal && realTotal != null && (
              <div style={{marginTop:6,padding:"4px 10px",background:
                result==="hit"?"rgba(0,200,83,0.1)":"rgba(200,16,46,0.1)",
                borderRadius:6,border:`1px solid ${result==="hit"?"rgba(0,200,83,0.3)":"rgba(200,16,46,0.3)"}`}}>
                <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>total real</div>
                <div style={{fontSize:14,fontWeight:700,color:result==="hit"?HIT_COLOR:MISS_COLOR}}>{realTotal}</div>
              </div>
            )}
          </div>

          <div style={{textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:800,color:aWin?NBA_WHITE:isFinal?TEXT2:TEXT,letterSpacing:"-0.5px",lineHeight:1}}>{aAbbr}</div>
            <div style={{fontSize:10,color:TEXT2,marginTop:4}}>{game.away}</div>
            <div style={{fontSize:12,color:TEXT3,marginTop:2}}>{aPpg.toFixed(1)} PPG</div>
            {game.away_record&&<div style={{fontSize:10,color:TEXT3}}>{game.away_record}</div>}
            {(isFinal||isLive)&&<div style={{fontSize:30,fontWeight:800,color:aWin?NBA_WHITE:TEXT2,marginTop:8,lineHeight:1}}>{game.vs}</div>}
          </div>
        </div>

        {/* Odds — aparece sempre (antes e depois do jogo) */}
        <OddsPanel
          proj={proj}
          overUnder={game.over_under}
          spread={game.spread}
          result={result}
          realTotal={realTotal}
        />

        {/* Histórico */}
        {game.home_id&&game.away_id&&(
          <HistoryPanel homeId={game.home_id} awayId={game.away_id} matchupAvg={avg} homeAbbr={hAbbr} awayAbbr={aAbbr}/>
        )}
      </div>
    </div>
  );
}

function App(){
  const weekDates=getWeekDates();
  const todayStr=getBrazilToday();
  const [selDate,setSelDate]=useState(todayStr);
  const [schedule,setSchedule]=useState({});
  const [editing,setEditing]=useState(null);
  const [loading,setLoading]=useState(true);
  const [updatedAt,setUpdatedAt]=useState(null);

  useEffect(()=>{
    let cancelled=false;
    async function load(){
      setLoading(true);
      try{
        const r=await fetch("/api/games?bust="+Date.now());
        const d=await r.json();
        if(!cancelled&&d.schedule){setSchedule(d.schedule);setUpdatedAt(new Date());}
      }catch(e){console.error(e);}
      finally{if(!cancelled)setLoading(false);}
    }
    load();
    const id=setInterval(load,30*60*1000);
    return()=>{cancelled=true;clearInterval(id);};
  },[]);

  const selGames=schedule[selDate]||[];
  const finals=selGames.filter(g=>g.status==="Final").length;
  const maxProj=Math.max(...selGames.map(g=>(g.home_ppg||PPG_FB[g.home]||0)+(g.away_ppg||PPG_FB[g.away]||0)).filter(Boolean),0);

  function handleSave(hs,vs){
    setSchedule(prev=>({...prev,[selDate]:prev[selDate].map(g=>g.id===editing.id?{...g,hs,vs,status:"Final"}:g)}));
    setEditing(null);
  }

  return(
    <div style={{background:BG,minHeight:"100vh",fontFamily:"inherit"}}>
      {editing&&<EditModal game={editing} onSave={handleSave} onClose={()=>setEditing(null)}/>}

      {/* Header */}
      <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`}}>
        <div style={{maxWidth:700,margin:"0 auto",padding:"1rem 1rem 0"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{display:"flex",borderRadius:4,overflow:"hidden"}}>
                <div style={{width:8,height:28,background:NBA_BLUE}}/>
                <div style={{width:8,height:28,background:NBA_RED}}/>
              </div>
              <div>
                <div style={{fontSize:9,color:TEXT2,textTransform:"uppercase",letterSpacing:"0.15em",fontWeight:600}}>NBA · 2025-26</div>
                <div style={{fontSize:18,fontWeight:800,color:TEXT,letterSpacing:"-0.3px"}}>Análise de Confrontos</div>
              </div>
            </div>
            <div style={{textAlign:"right",fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.08em"}}>
              {updatedAt?"ESPN · "+updatedAt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"carregando..."}
            </div>
          </div>

          {/* Week nav */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
            {weekDates.map(d=>{
              const isToday=d===todayStr,isSel=d===selDate;
              const games=schedule[d]||[];
              const fin=games.filter(g=>g.status==="Final").length;
              const tot=games.length;
              const dayName=DAYS_PT[new Date(d+"T12:00:00").getDay()];
              const dayNum=new Date(d+"T12:00:00").getDate();

              // Acertos do dia no botão
              const dayHits = games.filter(g => {
                if(g.status!=="Final"||!g.over_under) return false;
                return getGameStats(g).result==="hit";
              }).length;
              const dayWithOdds = games.filter(g=>g.status==="Final"&&g.over_under).length;

              return(
                <button key={d} onClick={()=>setSelDate(d)} style={{
                  background:isSel?NBA_BLUE:"transparent",
                  color:isSel?NBA_WHITE:isToday?NBA_BLUE:TEXT2,
                  border:"none",
                  borderBottom:isSel?`3px solid ${NBA_RED}`:isToday?`3px solid ${NBA_BLUE}`:"3px solid transparent",
                  padding:"8px 4px 10px",cursor:"pointer",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                  borderRadius:"4px 4px 0 0"
                }}>
                  <span style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>{dayName}</span>
                  <span style={{fontSize:15,fontWeight:800}}>{dayNum}</span>
                  <span style={{fontSize:9,color:isSel?"rgba(255,255,255,0.6)":TEXT3}}>
                    {tot>0?(fin>0?`${fin}/${tot}`:`${tot}j`):"—"}
                  </span>
                  {dayWithOdds>0&&(
                    <span style={{fontSize:8,color:isSel?"rgba(255,255,255,0.5)":dayHits/dayWithOdds>=0.5?"rgba(0,200,83,0.8)":"rgba(200,16,46,0.8)"}}>
                      {dayHits}/{dayWithOdds}
                    </span>
                  )}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{maxWidth:700,margin:"0 auto",padding:"1.25rem 1rem"}}>

        {/* Chips */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:"1.25rem"}}>
          {[
            ["Jogos",selGames.length||"—"],
            ["Finalizados",finals||"—"],
            ["Maior total proj.",maxProj?`${Math.round(maxProj)} pts`:"—"]
          ].map(([l,v])=>(
            <div key={l} style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:10,padding:"0.75rem 1rem"}}>
              <div style={{fontSize:9,color:TEXT3,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>{l}</div>
              <div style={{fontSize:20,fontWeight:800,color:TEXT}}>{v}</div>
            </div>
          ))}
        </div>

        {/* Relatório de acertos */}
        <AccuracyReport schedule={schedule} weekDates={weekDates} selDate={selDate}/>

        {loading&&<div style={{textAlign:"center",padding:"3rem 0",color:TEXT3,fontSize:13}}>Carregando jogos...</div>}
        {!loading&&selGames.length===0&&<div style={{textAlign:"center",padding:"3rem 0",color:TEXT3,fontSize:13}}>Nenhum jogo para este dia.</div>}
        {selGames.map(g=><MatchupCard key={g.id} game={g} onEdit={setEditing}/>)}

        <div style={{fontSize:9,color:TEXT3,marginTop:"1rem",textAlign:"center",letterSpacing:"0.05em"}}>
          Jogos, PPG, odds e histórico: ESPN API · Atualização automática a cada 30 min
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
